    <style>
        /* Estilos Base Dark Mode GAD */
        body {
            background-color: #0f172a; /* bg-slate-900 */
            color: #e2e8f0; /* text-slate-200 */
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .flag-button-spain {
            background: linear-gradient(to top, #c60b1e 0%, #c60b1e 33%, #ffc400 33%, #ffc400 66%, #c60b1e 66%, #c60b1e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: black;
        }

        /* -------------------------------------------------------------
           REGLAS OBLIGATORIAS: Textos de Ayuda, Firebase y Miniaturas
           ------------------------------------------------------------- */
        #helpContent [class*="bg-"], #helpContent [style*="background"] { background-color: #0f172a !important; border-color: #334155 !important; }
        #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
        #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

        td, tr { position: static !important; }
        .results-container { overflow: visible !important; }
        @media (hover: hover) and (pointer: fine) { 
            .thumbnail-img:hover { 
                transform: scale(4); 
                z-index: 9999 !important; 
                position: relative; 
                box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
                border-color: #06b6d4; 
            } 
        }

        /* -------------------------------------------------------------
           REGLAS OBLIGATORIAS: Responsive (Móvil) para Tablas
           ------------------------------------------------------------- */
        @media (max-width: 768px) {
            .api-table thead {
                display: none;
            }
            .api-table tbody tr {
                display: flex;
                flex-direction: column;
                background: #1e293b !important;
                border-radius: 12px;
                margin-bottom: 1rem;
                border: 1px solid #334155;
                padding: 10px;
            }
            .api-table td {
                display: flex;
                flex-direction: column;
                border-bottom: 1px solid #334155;
                padding: 10px 5px;
                width: 100% !important;
            }
            .api-table td:last-child {
                border-bottom: none;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding-top: 15px;
            }
            .api-table td img.thumbnail-img {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

        "Yibuti", "Zambia", "Zimbabue"
    ];

    function mostrarVisado() {
        const pais = document.getElementById('paises').value;
        const resultado = document.getElementById('resultado');

        if (pais && paisesVisado.includes(pais)) {
            // Se ha adaptado la alerta de visualización al Dark Mode, conservando el impacto visual de advertencia
            resultado.innerHTML = `
                <div class="p-5 rounded-xl bg-slate-800 border-2 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.2)] mt-4">
                    <p class="text-center font-bold text-slate-200 text-lg">
                        ${pais}
                    </p>
                    <p class="text-center mt-2 font-black text-red-500 text-xl tracking-wider">
                        NECESITA VISADO
                    </p>
                </div>
            `;
        } else {
            resultado.innerHTML = "";
        }
    }
</script>
