    .flag-button-spain {

        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    /* Adaptación de Textos de Ayuda y Firebase al Dark Mode */
    #helpContent [class*="bg-"], #helpContent [style*="background"] { background-color: #0f172a !important; border-color: #334155 !important; }
    #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
    #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

    /* Zoom de miniaturas sin cortes (Solo PC) */
    td, tr { position: static !important; }
    .results-container { overflow: visible !important; }
    @media (hover: hover) and (pointer: fine) { 
        .thumbnail-img:hover { 
            transform: scale(4); 
            z-index: 9999 !important; 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            border-color: #06b6d4; 
        } 
    }

    /* Responsive (Móvil) */
    @media (max-width: 768px) {
        thead {
            display: none !important;
        }
        tr {
            display: flex !important;
            flex-direction: column !important;
            background: #1e293b !important;
            border-radius: 12px !important;
            margin-bottom: 1rem;
            border: 1px solid #334155;
            overflow: hidden;
        }
        td {
            border: none !important;
            padding: 0.75rem !important;
        }
        .thumbnail-img {
            width: 100% !important;
            height: auto !important;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }
    }

          f: { desc: "Micros, ómnibus y camiones.", eq: "Permiso D / C" },
          g1: { desc: "Ciclomotores hasta 50 c.c.", eq: "Permiso AM" },
          g2: { desc: "Motocicletas desde 50 hasta 200 c.c.", eq: "Permiso A1 / A2 (España exige A2 para >125cc)" },
          g3: { desc: "Motocicletas sin límite de cilindrada.", eq: "Permiso A" },
          h: { desc: "Maquinaria vial y agrícola.", eq: "Vehículos Especiales" }
      },
      venezuela: { 
          primer_grado: { desc: "Vehículos de tracción animal.", eq: "N/A (Sujeto a normas locales)" },
          segundo_grado: { desc: "Motocicletas de cualquier cilindraje.", eq: "Permiso A" },
          tercer_grado: { desc: "Autos particulares hasta 9 puestos y carga 2.500 kg.", eq: "Permiso B" },
          cuarto_grado: { desc: "Público hasta 12 puestos y carga 6.000 kg.", eq: "Permiso D1 / C1" },
          quinto_grado: { desc: "Público hasta 33 puestos y carga 9.000 kg.", eq: "Permiso D / C" },
          titulo_superior_profesional: { desc: "Transporte >33 puestos, >9.000 kg y cargas de riesgo.", eq: "Permiso D / C + Autorización ADR" }
      }
    };

    const paisSelect = document.getElementById('pais');
    const permisoSelect = document.getElementById('tipo-permiso');
    const resultadoDiv = document.getElementById('resultado');
    const detalleBoton = document.getElementById('detalle-categorias');
    const detalleContenedor = document.getElementById('detalle-contenedor');
    const enlaceDGT = document.getElementById('enlace-dgt');

    paisSelect.addEventListener('change', () => {
      const pais = paisSelect.value;
      permisoSelect.innerHTML = '<option value="">Seleccione un tipo de licencia</option>';

      if (licenciaData[pais]) {
        for (const [key, value] of Object.entries(licenciaData[pais])) {
          const option = document.createElement('option');
          option.value = key;
          option.textContent = key.toUpperCase();
          permisoSelect.appendChild(option);
        }
      }
      
      resultadoDiv.innerHTML = '';
      resultadoDiv.classList.add('hidden');
      detalleContenedor.classList.add('hidden');
      detalleBoton.classList.add('hidden');
      enlaceDGT.classList.add('hidden');
    });

    permisoSelect.addEventListener('change', () => {
      const pais = paisSelect.value;
      const tipoPermiso = permisoSelect.value;

      if (licenciaData[pais] && licenciaData[pais][tipoPermiso]) {
        const datos = licenciaData[pais][tipoPermiso];
        resultadoDiv.classList.remove('hidden');
        resultadoDiv.innerHTML = `
            <div class="mb-2">
                <span class="block text-sm text-slate-400 mb-1">VEHÍCULOS AUTORIZADOS (ORIGEN):</span>
                <span class="text-emerald-500 font-bold">${datos.desc}</span>
            </div>
            <div class="mt-4 pt-3 border-t border-slate-700">
                <span class="block text-sm text-slate-400 mb-1">EQUIVALENCIA OPERATIVA EN ESPAÑA:</span>
                <span class="text-purple-500 font-black text-xl">${datos.eq}</span>
            </div>
        `;
        detalleBoton.classList.remove('hidden');
        enlaceDGT.classList.remove('hidden');
      } else {
        resultadoDiv.classList.remove('hidden');
        resultadoDiv.innerHTML = '<span class="text-red-500 font-bold">No se encontraron datos para su selección.</span>';
        detalleBoton.classList.add('hidden');
        enlaceDGT.classList.add('hidden');
      }
    });

    detalleBoton.addEventListener('click', () => {
      const pais = paisSelect.value;

      if (licenciaData[pais]) {
        detalleContenedor.innerHTML = '<h3 class="text-lg text-cyan-500 font-semibold mb-4">Todas las categorías:</h3>';
        const ul = document.createElement('ul');
        ul.style.textAlign = 'left';
        ul.classList.add('list-disc', 'pl-6', 'space-y-3');
        
        for (const [key, data] of Object.entries(licenciaData[pais])) {
          const li = document.createElement('li');
          li.innerHTML = `
            <span class="font-bold text-cyan-400">${key.toUpperCase()}:</span> 
            <span class="text-emerald-400">${data.desc}</span> 
            <br>
            <span class="text-purple-400 text-sm font-semibold ml-4 border-l-2 border-purple-500 pl-2 block mt-1">🡒 ${data.eq}</span>
          `;
          ul.appendChild(li);
        }

        detalleContenedor.appendChild(ul);
        detalleContenedor.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
