<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Licencia de Conducir de Polonia - GAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Identidad Visual Dark Mode GAD */
        body { 
            background-color: #0f172a; 
            color: #e2e8f0; 
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Adaptación de Textos y Contenedores */
        .bg-slate-900 { background-color: #0f172a; }
        .bg-slate-800 { background-color: #1e293b; }
        .border-slate-700 { border-color: #334155; }
        .text-cyan-500 { color: #06b6d4; }

        /* Estilización de Inputs y Selectores (Dark Mode) */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            filter: invert(0.8) sepia(1) saturate(5) hue-rotate(150deg);
            cursor: pointer;
        }

        /* Adaptación de Textos de Ayuda */
        #helpContent [class*="bg-"], #helpContent [style*="background"] { background-color: #0f172a !important; border-color: #334155 !important; }
        #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
        #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

        .card-container {
            background-color: #1e293b;
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            margin: 2rem auto;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background-color: #0f172a;
        }

        /* Scrollbar personalizada para Dark Mode */
        .table-container::-webkit-scrollbar { width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #1e293b; }
        .table-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* Responsive Móvil: Tabla a Tarjetas */
        @media (max-width: 768px) {
            #referenceDataBody tr {
                display: flex;
                flex-direction: column;
                background-color: #1e293b;
                border-radius: 8px;
                margin-bottom: 0.75rem;
                padding: 1rem;
                border: 1px solid #334155;
            }
            #referenceDataBody td {
                display: flex;
                justify-content: space-between;
                padding: 0.25rem 0;
                border: none;
            }
            #referenceDataBody td::before {
                content: attr(data-label);
                font-weight: bold;
                color: #06b6d4;
            }
            thead { display: none; }
        }
    </style>
</head>
<body>

    <header class="min-h-[5rem] py-3 md:py-0 md:h-28 bg-slate-900 w-full border-b border-slate-800 flex items-center justify-between px-2 md:px-8 shadow-md sticky top-0 z-[1000] gap-2">
        <img src="logogad.png" onerror="this.onerror=null; this.src='../ASSETS/logogad.png';" alt="GAD LOGO" class="h-[64px] w-[64px] md:h-[112px] md:w-[112px] drop-shadow-md flex-shrink-0">
        
        <div class="text-center flex-1">
            <h1 class="text-[15px] md:text-3xl font-black text-white tracking-wider uppercase leading-tight" id="headerTitle">
                VERIFICACIÓN LICENCIA<br class="md:hidden"> POLONIA (PNC)
            </h1>
            <h2 class="text-cyan-500 font-bold tracking-widest uppercase text-[12px] md:text-sm mt-1 leading-tight">
                Grupo de Análisis Documental
            </h2>
        </div>

        <img src="t4c.png" onerror="this.onerror=null; this.src='../ASSETS/t4c.png';" alt="T4C" class="h-[56px] w-[56px] md:h-[96px] md:w-[96px] drop-shadow-md flex-shrink-0">
    </header>

    <main class="flex-grow px-4">
        <div class="card-container text-center">
            <h2 class="text-xl font-bold mb-2 text-white uppercase tracking-wide">Nº SERIE REVERSO</h2>
            <p class="text-sm text-cyan-500 font-semibold mb-4 tracking-tighter">(Prefijos por Año - Campo 13)</p>
            
            <div class="table-container">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-400 uppercase bg-slate-900 sticky top-0">
                        <tr>
                            <th scope="col" class="px-6 py-3 border-b border-slate-700">Año Expedición</th>
                            <th scope="col" class="px-6 py-3 border-b border-slate-700">Prefijo</th>
                        </tr>
                    </thead>
                    <tbody id="referenceDataBody" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const prefijosPolonia = {
            1999: 'A', 2000: 'B', 2001: 'C', 2002: 'D', 2003: 'E', 2004: 'F', 2005: 'G',
            2006: 'H', 2007: 'I', 2008: 'J', 2009: 'K', 2010: 'L', 2011: 'M', 2012: 'N',
            2013: 'O', 2014: 'P', 2015: 'Q', 2016: 'R', 2017: 'S', 2018: ['T', 'U'],
            2019: 'W', 2020: ['W', 'Y'], 2021: 'Z', 2022: 'AA', 2023: 'BA', 2024: 'CA', 2025: 'DA'
        };

        function renderReferenceTable() {
            const tableBody = document.getElementById('referenceDataBody');
            const sortedYears = Object.keys(prefijosPolonia).sort((a, b) => b - a);
            let tableHTML = '';
            sortedYears.forEach(year => {
                const prefijo = prefijosPolonia[year];
                const displayPrefijo = Array.isArray(prefijo) ? prefijo.join('-') : prefijo;
                tableHTML += `
                    <tr class="hover:bg-slate-700/50 transition-colors">
                        <td class="px-6 py-4 font-bold text-white" data-label="Año">${year}</td>
                        <td class="px-6 py-4 font-bold text-cyan-400" data-label="Prefijo">${displayPrefijo}</td>
                    </tr>
                `;
            });
            tableBody.innerHTML = tableHTML;
        }

        window.onload = () => {
            renderReferenceTable();
        };
    </script>
</body>
</html>
