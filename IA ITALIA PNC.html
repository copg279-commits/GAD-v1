    .drop-zone {

    /* Adaptación de Textos de Ayuda y Firebase al Dark Mode */

    #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
    #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

    /* Zoom de miniaturas sin cortes (Solo PC) */
    td, tr { position: static !important; }
    .results-container { overflow: visible !important; }
    @media (hover: hover) and (pointer: fine) { 
        .thumbnail-img:hover { 
            transform: scale(4); 
            z-index: 9999 !important; 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            border-color: #06b6d4; 
        } 
    }

    /* Responsive Modo Tarjetas (Móvil) */
    @media (max-width: 768px) {
        #cpiDataTable thead { display: none; }
        #cpiDataTable tr { display: flex; flex-direction: column; background: #1e293b; border-radius: 12px; margin-bottom: 1rem; padding: 1rem; border: 1px solid #334155; }
        #cpiDataTable td { border: none; padding: 0.5rem 0; display: flex; justify-content: space-between; align-items: center; color: #e2e8f0; }
        #cpiDataTable td:last-child { justify-content: flex-end; }
        #cpiDataTable td::before { content: attr(data-label); font-weight: bold; color: #06b6d4; text-transform: uppercase; font-size: 0.75rem; margin-right: 1rem; }
    }
  </style>

  <script>
    // --- 1. CONFIGURACIÓN V4 ---
    const firebaseConfig = {
      apiKey: "AIzaSyCY8V_P7m8lZUvGbMVlGaa-GVhbmyikmag",
      authDomain: "gad-alicante-v4.firebaseapp.com",
      databaseURL: "https://gad-alicante-v4-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "gad-alicante-v4",
      storageBucket: "gad-alicante-v4.firebasestorage.app",
      messagingSenderId: "119727545224",
      appId: "1:119727545224:web:36880c50d196c456cdb83d"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth(); 
    const licenciasNuevasRef = db.ref('licencias_italia');
    
    let datosCompletos = [];
    let isUserAuthenticated = false; 
    let geminiApiKey = localStorage.getItem('ai_api_key') || '', geminiModelName = localStorage.getItem('gemini_model_name') || 'gemini-1.5-flash';

    // --- 2. SISTEMA DE SEGURIDAD ESTRICTA ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            isUserAuthenticated = true;
            document.getElementById('auth-loading-msg').style.display = 'none';
            document.getElementById('db-panel').style.display = 'block';
            cargarDatos();
        } else {
            document.getElementById('auth-loading-msg').innerHTML = "<span class='text-red-400 font-bold'>⚠️ Acceso Denegado. Inicia sesión en el Menú.</span>";
        }
    });

    // --- CONFIG UI ---
    function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); document.getElementById('apiKeyInput').value = geminiApiKey; document.getElementById('modelInput').value = geminiModelName; }
    function saveSettings() { const key = document.getElementById('apiKeyInput').value.trim(), model = document.getElementById('modelInput').value.trim(); if(key && model) { geminiApiKey = key; geminiModelName = model; localStorage.setItem('ai_api_key', key); localStorage.setItem('gemini_model_name', model); alert("Guardado."); toggleSettings(); } }

    function limpiarInterfaz(modo) {
        if (modo === 'manual') {
            imagesBuffer = []; updateImageStatus();
            document.getElementById('aiResultBox').classList.add('hidden');
            document.getElementById('aiNumero').textContent = ''; document.getElementById('aiFecha').textContent = '';
        }
        if (modo === 'ia') {
            document.getElementById('numero').value = ''; document.getElementById('output').innerHTML = '';
            if (!document.getElementById('aiResultBox').classList.contains('hidden')) {
                document.getElementById('aiResultBox').classList.add('hidden'); imagesBuffer = []; updateImageStatus();
            }
        }
    }
    function limpiarTodo(origen) { imagesBuffer = []; updateImageStatus(); document.getElementById('aiResultBox').classList.add('hidden'); if (origen === 'full' || origen === 'manual') { document.getElementById('numero').value = ''; document.getElementById('output').innerHTML = ''; } }

    let imagesBuffer = []; 
    const dropZone = document.getElementById('mainDropZone'), statusText = document.getElementById('statusText'), dot1 = document.getElementById('imgDot1'), dot2 = document.getElementById('imgDot2');
    
    function updateImageStatus() { 
        const count = imagesBuffer.length; dot1.classList.toggle('active', count >= 1); dot2.classList.toggle('active', count >= 2); 
        statusText.textContent = count === 0 ? "" : count === 1 ? "1 imagen lista. Falta la otra." : "Procesando..."; 
        if (count >= 2) processBufferedImages(); 
    }

    function handleFiles(files) { 
        if (!files.length) return; limpiarInterfaz('ia');
        Array.from(files).forEach(file => { if (file.type.startsWith('image/')) { const reader = new FileReader(); reader.onload = e => { if (imagesBuffer.length < 2) { imagesBuffer.push(e.target.result.replace(/^data:(.*,)?/, '')); updateImageStatus(); } }; reader.readAsDataURL(file); } }); 
    }

    // --- IA (Gemini) ---
    async function processBufferedImages() {
        if (imagesBuffer.length < 2) return; document.getElementById('loadingOverlay').classList.remove('hidden');
        const PROMPT = `Analiza DOS imágenes (Anverso/Reverso) ID Italia. 1. ANVERSO: FECHA Campo 4a. 2. REVERSO: NÚMERO SOPORTE (2 letras+numeros, abajo derecha). JSON: {"numero": "VALOR", "fecha": "DD/MM/AAAA"}`;
        try { 
            if (!geminiApiKey) throw new Error("Falta API Key"); 
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModelName}:generateContent?key=${geminiApiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT }, { inline_data: { mime_type: "image/jpeg", data: imagesBuffer[0] } }, { inline_data: { mime_type: "image/jpeg", data: imagesBuffer[1] } }] }] }) });
            const data = await response.json(); if (data.error) throw new Error(data.error.message); handleAiResult(JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim()));
        } catch (error) { 
            console.error(error); alert("Error IA: " + error.message); 
        } finally { 
            document.getElementById('loadingOverlay').classList.add('hidden'); imagesBuffer = []; updateImageStatus(); 
        }
    }

    function validarFormatoItalia(num) { return /^[A-Z]{2}\d{7}$/.test(num); }

    function handleAiResult(result) {
        const num = (result.numero || "").replace(/[^A-Za-z0-9]/g, '').toUpperCase(), fecha = (result.fecha || "").replace(/\./g, '/').replace(/-/g, '/');
        document.getElementById('numero').value = num; document.getElementById('aiNumero').textContent = num || "ND"; document.getElementById('aiFecha').textContent = fecha || "ND";
        const box = document.getElementById('aiResultBox'), header = document.getElementById('aiHeader'), title = document.getElementById('aiTitle'), msg = document.getElementById('aiValidationMsg'), actions = document.getElementById('aiActions'); box.className = "mt-6 w-11/12 max-w-md mx-auto bg-slate-800 border-2 rounded-lg shadow-xl overflow-hidden mb-10"; actions.innerHTML = "";

        if (!num || !fecha) { box.classList.remove('hidden'); msg.innerHTML = "<span class='text-red-400'>Error de lectura.</span>"; return; }
        if (!validarFormatoItalia(num)) {
            box.classList.add('border-red-600'); header.className = "bg-red-900/50 p-3 border-b border-red-800 text-red-200"; title.innerHTML = "⚠️ FORMATO INVÁLIDO";
            msg.className = "bg-red-900/30 p-4 rounded border border-red-800 text-left";
            msg.innerHTML = `<div class="text-red-400 font-bold text-sm"><p class="uppercase mb-1">ERROR FORMATO:</p><p>Debe ser 2 Letras + 7 Números (${num}).</p></div>`;
            box.classList.remove('hidden'); return;
        }
        mostrarResultadoIA(verificarCongruencia(num, fecha), num, fecha);
    }

    function mostrarResultadoIA(chequeo, num, fecha) {
        const box = document.getElementById('aiResultBox'), header = document.getElementById('aiHeader'), title = document.getElementById('aiTitle'), msg = document.getElementById('aiValidationMsg'), actions = document.getElementById('aiActions');
        if (chequeo.esFraude) {
            box.classList.add('border-red-600'); header.className = "bg-red-900/50 p-3 border-b border-red-800 text-red-200"; title.innerHTML = "⚠️ INCONGRUENCIA DETECTADA";
            msg.className = "bg-red-900/30 p-4 rounded border border-red-800 text-left";
            let estimateHtml = chequeo.fechaEstimada ? `<div class="mt-3 bg-yellow-900/30 p-3 rounded-lg border border-yellow-700 text-center"><p class="text-yellow-400 text-xs uppercase font-bold">Fecha Real Estimada:</p><p class="text-xl font-bold text-yellow-300">${chequeo.fechaEstimada}</p></div>` : '';
            msg.innerHTML = `<div class="text-red-400 font-bold text-lg mb-2">${chequeo.mensajeClaro}</div>${estimateHtml}<div class="mt-3 pt-3 border-t border-red-800 text-slate-300 text-xs"><p class="font-bold mb-1">Detalles:</p>${chequeo.detallesTecnicos}</div>`;
        } else if (chequeo.existe) {
            box.classList.add('border-cyan-600'); header.className = "bg-cyan-900/50 p-3 border-b border-cyan-800 text-cyan-200"; title.innerHTML = "ℹ️ Registrado Correctamente";
            msg.innerHTML = `<p class="text-cyan-300 p-3 bg-cyan-900/30 rounded-lg">El número existe y la fecha coincide.</p>`;
        } else {
            box.classList.add('border-emerald-600'); header.className = "bg-emerald-900/50 p-3 border-b border-emerald-800 text-emerald-200"; title.innerHTML = "✅ Documento Correcto";
            msg.innerHTML = `<div class="bg-emerald-900/30 p-3 rounded-lg border border-emerald-800">
                <p class="text-emerald-400 font-bold text-lg mb-1">Progresión Lógica Correcta</p>
                <div class="text-slate-300 text-xs mt-2 pt-2 border-t border-emerald-800">
                    <p class="font-bold uppercase mb-1 text-emerald-500">Rango Justificado:</p>
                    ${chequeo.rangoInfo}
                </div>
            </div>`;
            window.tempAiData = { numero: num, fecha: fecha };
            actions.innerHTML = `<button onclick="guardarDesdeAI()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg mt-2 shadow hover:bg-emerald-700 flex justify-center items-center gap-2 transition">AÑADIR A LA LISTA</button>`;
        }
        box.classList.remove('hidden');
    }

    function calcularEstimacionString(numStr, antesObj, despuesObj) {
        if (!antesObj || !despuesObj) return null;
        const n1 = parseInt(antesObj.numero.replace(/\D/g, ''), 36) || 0, n2 = parseInt(despuesObj.numero.replace(/\D/g, ''), 36) || 0, nTarget = parseInt(numStr.replace(/\D/g, ''), 36) || 0;
        if (n2 <= n1) return null;
        const prop = (nTarget - n1) / (n2 - n1);
        const parseDate = (str) => { const p = str.split('/'); return new Date(p[2], p[1] - 1, p[0]); };
        const f1 = parseDate(antesObj.fecha), f2 = parseDate(despuesObj.fecha);
        if (f1 >= f2) return null;
        return new Date(f1.getTime() + prop * (f2.getTime() - f1.getTime())).toLocaleDateString("es-ES", { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function verificarCongruencia(numeroDoc, fechaDocStr) {
        const [d, m, y] = fechaDocStr.split('/').map(Number), fechaDoc = new Date(y, m - 1, d);
        const existente = datosCompletos.find(d => d.numero === numeroDoc);
        if (existente) {
            return existente.fecha === fechaDocStr ? { esFraude: false, existe: true } : { esFraude: true, existe: true, mensajeClaro: "El número existe pero la fecha NO coincide.", detallesTecnicos: `Registrado: ${existente.fecha} vs Documento: ${fechaDocStr}` };
        }
        
        const sorted = [...datosCompletos].sort((a, b) => a.numero.localeCompare(b.numero, undefined, { numeric: true }));
        const anterior = sorted.filter(d => d.numero.localeCompare(numeroDoc, undefined, { numeric: true }) < 0).pop();
        const posterior = sorted.find(d => d.numero.localeCompare(numeroDoc, undefined, { numeric: true }) > 0);
        
        let esFraude = false, mensajeClaro = "", detallesTecnicos = "", fechaEstimada = null, rangoInfo = "";

        if (anterior) {
            const [d1, m1, y1] = anterior.fecha.split('/'); 
            if (fechaDoc < new Date(`${y1}-${m1}-${d1}`)) { 
                esFraude = true; mensajeClaro = "Fecha demasiado ANTIGUA."; detallesTecnicos = `Posterior a ${anterior.numero} (${anterior.fecha}).`; 
            }
        }
        if (posterior && !esFraude) {
            const [d2, m2, y2] = posterior.fecha.split('/'); 
            if (fechaDoc > new Date(`${y2}-${m2}-${d2}`)) { 
                esFraude = true; mensajeClaro = "Fecha demasiado FUTURA."; detallesTecnicos = `Anterior a ${posterior.numero} (${posterior.fecha}).`; 
            }
        }
        
        if (anterior && posterior) {
            fechaEstimada = calcularEstimacionString(numeroDoc, anterior, posterior);
            rangoInfo = `Se sitúa entre el anterior <strong>${anterior.numero}</strong> (${anterior.fecha}) y el posterior <strong>${posterior.numero}</strong> (${posterior.fecha}).`;
        } else if (anterior) {
            rangoInfo = `Es posterior al último registro conocido <strong>${anterior.numero}</strong> (${anterior.fecha}).`;
        } else if (posterior) {
            rangoInfo = `Es anterior al primer registro conocido <strong>${posterior.numero}</strong> (${posterior.fecha}).`;
        } else {
            rangoInfo = "Es el primer registro de la base de datos.";
        }

        return { esFraude, existe: false, mensajeClaro, detallesTecnicos, fechaEstimada, rangoInfo };
    }

    function buscarFecha() {
        limpiarInterfaz('manual');
        const num = document.getElementById("numero").value.trim().toUpperCase();
        const output = document.getElementById("output");
        if(!num) return;
        if (!validarFormatoItalia(num)) { output.innerHTML = "<div class='bg-red-900/30 border border-red-800 text-red-400 p-3 rounded font-bold'>Formato inválido (2 Letras + 7 Números)</div>"; return; }
        
        if(!isUserAuthenticated && datosCompletos.length === 0) {
             output.innerHTML = "<div class='text-orange-400 font-bold'>Conectando con V4... Espera un segundo.</div>";
             return;
        }

        const exacto = datosCompletos.find(d => d.numero === num);
        if (exacto) { output.innerHTML = `<div class='bg-slate-800 border border-slate-700 p-4 rounded'><p class='text-emerald-400 font-bold text-xl'>✅ EXISTE</p><p class="text-slate-300 mt-1">Fecha registrada: <strong class="text-cyan-400">${exacto.fecha}</strong></p></div>`; return; }

        const sorted = [...datosCompletos].sort((a, b) => a.numero.localeCompare(b.numero, undefined, { numeric: true }));
        const anterior = sorted.filter(d => d.numero.localeCompare(num, undefined, { numeric: true }) < 0).pop();
        const posterior = sorted.find(d => d.numero.localeCompare(num, undefined, { numeric: true }) > 0);
        
        let html = "";
        if (anterior && posterior) {
            const estimacion = calcularEstimacionString(num, anterior, posterior);
            html = `<div class="bg-slate-800 p-4 rounded border border-slate-700 shadow-sm text-left"><h4 class="font-bold text-cyan-400 border-b border-slate-700 pb-2 mb-2 text-center">📊 ESTIMACIÓN MANUAL</h4><div class="text-xs text-slate-400 flex justify-between mb-3"><span>Ant: ${anterior.numero} (${anterior.fecha})</span><span>Post: ${posterior.numero} (${posterior.fecha})</span></div><div class="text-center bg-slate-900 p-3 rounded border border-slate-700"><p class="text-xs uppercase text-slate-500 font-bold tracking-wider">Fecha Probable</p><p class="text-2xl font-bold text-cyan-400 mt-1">${estimacion || "Calculando..."}</p></div></div>`;
        } else if (anterior) { html = `<div class="bg-slate-800 border border-slate-700 p-3 rounded text-sm text-slate-300">Posterior al último registro (${anterior.fecha}). Debería ser reciente.</div>`;
        } else if (posterior) { html = `<div class="bg-slate-800 border border-slate-700 p-3 rounded text-sm text-slate-300">Anterior al primer registro (${posterior.fecha}). Debería ser antiguo.</div>`;
        } else { html = `<div class="text-slate-400">Sin datos suficientes.</div>`; }
        output.innerHTML = html;
    }

    window.addEventListener('dragover', e => e.preventDefault()); window.addEventListener('drop', e => e.preventDefault());
    dropZone.addEventListener('dragenter', () => dropZone.classList.add('drag-active'));
    dropZone.addEventListener('dragleave', e => { if (e.target === dropZone) dropZone.classList.remove('drag-active'); });
    dropZone.addEventListener('drop', e => { dropZone.classList.remove('drag-active'); handleFiles(e.dataTransfer.files); });
    window.addEventListener('paste', e => { const files = []; Array.from(e.clipboardData.items).forEach(i => { if (i.type.startsWith("image")) files.push(i.getAsFile()); }); handleFiles(files); });
    
    document.getElementById("numero").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            buscarFecha();
        }
    });

    function cargarDatos() { 
        licenciasNuevasRef.on('value', (s) => { 
            datosCompletos = []; 
            const d = s.val(); 
            if (d) Object.keys(d).forEach(k => datosCompletos.push({ ...d[k], key: k })); 
            datosCompletos.sort((a, b) => a.numero.localeCompare(b.numero, undefined, { numeric: true })); 
            renderTabla(); 
        }); 
    }
    
    document.getElementById('mostrarFormularioBtn').onclick = () => { document.getElementById('formularioNuevosDatos').classList.toggle('hidden'); document.getElementById('cpiDataTable').classList.add('hidden'); };
    document.getElementById('mostrarListadoBtn').onclick = () => { document.getElementById('cpiDataTable').classList.toggle('hidden'); document.getElementById('formularioNuevosDatos').classList.add('hidden'); };
    
    function guardarNuevoNumero() { 
        if(!isUserAuthenticated) return alert("No tienes permisos en V4.");
        const num = document.getElementById('nuevoNumero').value.trim().toUpperCase(), date = document.getElementById('nuevaFecha').value; 
        if(!num || !date) return alert("Faltan datos"); 
        const [y,m,d] = date.split('-'); 
        const fFmt = `${d}/${m}/${y}`; 
        if (!validarFormatoItalia(num)) return alert("Formato incorrecto"); 
        const chk = verificarCongruencia(num, fFmt); 
        if(chk.esFraude) return alert(chk.mensajeClaro); 
        licenciasNuevasRef.child(num).set({ numero: num, fecha: fFmt }).then(() => { alert("Guardado OK"); }); 
    }
    
    function guardarDesdeAI() { 
        if(!isUserAuthenticated) return alert("No autorizado.");
        if(!window.tempAiData) return; 
        licenciasNuevasRef.child(window.tempAiData.numero).set(window.tempAiData).then(() => { alert("Añadido."); document.getElementById('aiResultBox').classList.add('hidden'); }); 
    }
    
    function eliminarRegistro(key) {
        if(!isUserAuthenticated) return alert("No autorizado.");
        if(confirm('¿Borrar?')) licenciasNuevasRef.child(key).remove();
    }

    // CORRECCIÓN ORDENAMIENTO: Ahora las fechas se ordenan del más nuevo al más antiguo correctamente.
    function renderTabla() { 
        const tb = document.getElementById('cpiList'); tb.innerHTML = ''; 
        [...datosCompletos].sort((a,b) => { 
            const [d1,m1,y1] = a.fecha.split('/'); 
            const [d2,m2,y2] = b.fecha.split('/'); 
            // Creamos los objetos Date usando año, mes-1, y día para garantizar una resta perfecta (orden descendente)
            return new Date(y2, m2 - 1, d2) - new Date(y1, m1 - 1, d1); 
        }).forEach(d => { 
            tb.innerHTML += `<tr class="bg-slate-800 border-b border-slate-700 hover:bg-slate-700 transition"><td class="px-4 py-3 font-mono font-bold text-cyan-400" data-label="Número">${d.numero}</td><td class="px-4 py-3" data-label="Fecha">${d.fecha}</td><td class="px-4 py-3 text-right"><span onclick="eliminarRegistro('${d.key}')" class="text-red-500 font-bold cursor-pointer hover:text-red-400">X</span></td></tr>`; 
        }); 
    }
  </script>
