<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estimador de Nacimiento por DNI - GAD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Identidad Visual Dark Mode GAD */
    body { background-color: #0f172a; color: #e2e8f0; }
    .bg-slate-900 { background-color: #0f172a; }
    .bg-slate-800 { background-color: #1e293b; }
    .border-slate-700 { border-color: #334155; }
    .text-cyan-500 { color: #06b6d4; }

    /* Estilización de Inputs de Fecha y Número (Dark Mode) */
    input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        filter: invert(0.8) sepia(1) saturate(5) hue-rotate(150deg); /* Flechas en tono cyan/oscuro */
        cursor: pointer;
    }

    /* Adaptación de Textos de Ayuda y Firebase al Dark Mode */
    #helpContent [class*="bg-"], #helpContent [style*="background"] { background-color: #0f172a !important; border-color: #334155 !important; }
    #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
    #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

    /* Listado y Scroll */
    .listado-container { max-height: 400px; overflow-y: auto; border-radius: 8px; }
    
    /* Zoom de miniaturas sin cortes (Solo PC) */
    td, tr { position: static !important; }
    .results-container { overflow: visible !important; }
    @media (hover: hover) and (pointer: fine) { 
        .thumbnail-img:hover { 
            transform: scale(4); 
            z-index: 9999 !important; 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            border-color: #06b6d4; 
        } 
    }

    /* Responsive Móvil: Tabla a Tarjetas */
    @media (max-width: 768px) {
        #dniDataTable thead { display: none; }
        #dniList tr {
            display: flex;
            flex-direction: column;
            background-color: #1e293b;
            border-radius: 12px;
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #334155;
        }
        #dniList td {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border: none;
            color: #e2e8f0 !important;
        }
        #dniList td::before {
            content: attr(data-label);
            font-weight: bold;
            color: #06b6d4;
            margin-right: 10px;
        }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="min-h-[5rem] py-3 md:py-0 md:h-28 bg-slate-900 w-full border-b border-slate-800 flex items-center justify-between px-2 md:px-8 shadow-md sticky top-0 z-[1000] gap-2">
    <img src="logogad.png" onerror="this.onerror=null; this.src='../ASSETS/logogad.png';" alt="GAD LOGO" class="h-[64px] w-[64px] md:h-[112px] md:w-[112px] drop-shadow-md flex-shrink-0">
    
    <div class="text-center flex-1">
      <h1 class="text-[15px] md:text-3xl font-black text-white tracking-wider uppercase leading-tight" id="headerTitle">
        ESTIMADOR NACIMIENTO<br class="md:hidden"> DNI ARGENTINA
      </h1>
      <h2 class="text-cyan-500 font-bold tracking-widest uppercase text-[12px] md:text-sm mt-1 leading-tight">
        Grupo de Análisis Documental
      </h2>
    </div>

    <img src="t4c.png" onerror="this.onerror=null; this.src='../ASSETS/t4c.png';" alt="T4C" class="h-[56px] w-[56px] md:h-[96px] md:w-[96px] drop-shadow-md flex-shrink-0">
  </header>

  <main class="flex-grow p-4">
    <div class="max-w-md mx-auto">
        <p class="text-center mt-4 text-slate-400">
            Ingresa un número de <span class="text-red-500 font-bold uppercase">DNI argentino</span>
        </p>

        <input type="number" id="dniInput" placeholder="Ej: 35273789" class="block mx-auto mt-6 p-3 text-lg w-full bg-slate-800 border border-slate-700 rounded-lg text-center text-white focus:ring-2 focus:ring-cyan-500 outline-none">

        <button onclick="calcularNacimiento()" class="block mx-auto mt-4 w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-3 rounded-md transition-colors shadow-lg">
            CALCULAR FECHA
        </button>

        <div id="resultado" class="w-full mt-8 font-bold text-xl text-center p-4 rounded-lg bg-slate-800 border border-slate-700 min-h-[100px] flex flex-col justify-center">
            <span class="text-slate-500 text-sm font-normal italic">El resultado aparecerá aquí</span>
        </div>

        <div id="loading-msg" class="text-center text-slate-500 mt-6 font-bold">Conectando con Base de Datos V4...</div>

        <div class="bg-slate-800 border border-slate-700 shadow-xl rounded-xl p-6 mt-8 w-full" id="main-panel" style="display:none;">
            <h3 class="text-cyan-500 text-lg font-bold mb-4 text-center uppercase tracking-wider">Gestión de Base de Datos</h3>
            <div class="flex flex-col space-y-3">
                <button id="mostrarFormularioBtn" class="w-full bg-emerald-600 text-white py-3 rounded-md shadow hover:bg-emerald-700 font-bold transition">INTRODUZCA NUEVO DNI</button>
                <button id="toggleDniListBtn" class="w-full bg-slate-700 text-white py-3 rounded-md shadow hover:bg-slate-600 font-bold transition">CONSULTAR LISTA COMPLETA</button>
            </div>

            <div id="formularioNuevosDatos" class="mt-6 hidden border-t border-slate-700 pt-4">
                <div class="mb-4">
                    <label for="nuevoDNI" class="block text-sm font-bold text-slate-400 mb-1">Número de DNI:</label>
                    <input type="number" id="nuevoDNI" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                </div>
                <div class="mb-4">
                    <label for="nuevaFecha" class="block text-sm font-bold text-slate-400 mb-1">Fecha de nacimiento:</label>
                    <input type="date" id="nuevaFecha" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                </div>
                <div class="flex space-x-2">
                    <button onclick="guardarNuevoDNI()" class="w-1/2 bg-cyan-600 text-white py-2 rounded-md font-bold hover:bg-cyan-700">Guardar</button>
                    <button onclick="limpiarCampos()" class="w-1/2 bg-slate-600 text-white py-2 rounded-md font-bold hover:bg-slate-700">Limpiar</button>
                </div>
                <div id="mensajeGuardado" class="mt-4 text-sm font-medium text-center"></div>
            </div>

            <div id="dniDataTable" class="mt-6 hidden">
                <h3 class="text-cyan-500 text-lg font-bold mb-4 text-center uppercase">Listado Completo</h3>
                <div class="listado-container border border-slate-700">
                    <table class="w-full text-sm text-left" id="dniTableElement">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-900 sticky top-0">
                            <tr>
                                <th class="px-4 py-3">DNI</th>
                                <th class="px-4 py-3">Nacimiento</th>
                                <th class="px-4 py-3">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="dniList" class="bg-slate-800 divide-y divide-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Configuración Firebase (Mantenida igual)
    const firebaseConfig = {
      apiKey: "AIzaSyCY8V_P7m8lZUvGbMVlGaa-GVhbmyikmag",
      authDomain: "gad-alicante-v4.firebaseapp.com",
      databaseURL: "https://gad-alicante-v4-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "gad-alicante-v4",
      storageBucket: "gad-alicante-v4.firebasestorage.app",
      messagingSenderId: "119727545224",
      appId: "1:119727545224:web:36880c50d196c456cdb83d"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    const dniRef = database.ref('dni_argentina');

    let datosCompletos = [];
    let isUserAuthenticated = false;

    auth.onAuthStateChanged((user) => {
        if (user) {
            isUserAuthenticated = true;
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            iniciarDescargaDatos();
        } else {
            document.getElementById('loading-msg').innerHTML = "<span class='text-red-500'>⚠️ Error: No autenticado en V4</span>";
        }
    });

    function iniciarDescargaDatos() {
        dniRef.on('value', (snapshot) => {
            datosCompletos = [];
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                datosCompletos.push({
                    key: childSnapshot.key,
                    dni: parseInt(data.dni),
                    fecha: new Date(data.fecha)
                });
            });
            renderizarTablaDni();
        });
    }

    const mostrarFormularioBtn = document.getElementById('mostrarFormularioBtn');
    const toggleDniListBtn = document.getElementById('toggleDniListBtn');
    const formularioNuevosDatos = document.getElementById('formularioNuevosDatos');
    const dniDataTable = document.getElementById('dniDataTable');

    mostrarFormularioBtn.addEventListener('click', () => {
        formularioNuevosDatos.classList.toggle('hidden');
        dniDataTable.classList.add('hidden');
    });
    
    toggleDniListBtn.addEventListener('click', () => {
        dniDataTable.classList.toggle('hidden');
        formularioNuevosDatos.classList.add('hidden');
    });

    function limpiarCampos() {
        document.getElementById('nuevoDNI').value = '';
        document.getElementById('nuevaFecha').value = '';
        document.getElementById('mensajeGuardado').textContent = '';
    }

    function guardarNuevoDNI() {
      const nuevoDNI = parseInt(document.getElementById('nuevoDNI').value);
      const nuevaFechaStr = document.getElementById('nuevaFecha').value;
      if (isNaN(nuevoDNI) || !nuevaFechaStr) return;
      
      dniRef.push({ dni: nuevoDNI, fecha: nuevaFechaStr }).then(() => {
          document.getElementById('mensajeGuardado').innerHTML = '<span class="text-emerald-500">Guardado correctamente</span>';
          limpiarCampos();
      });
    }

    function renderizarTablaDni() {
      const list = document.getElementById('dniList');
      list.innerHTML = '';
      datosCompletos.sort((a, b) => b.dni - a.dni).forEach(dato => {
        const fila = document.createElement('tr');
        fila.innerHTML = `
            <td class="px-4 py-3 font-mono" data-label="DNI">${dato.dni}</td>
            <td class="px-4 py-3" data-label="Nacimiento">${dato.fecha.toLocaleDateString()}</td>
            <td class="px-4 py-3" data-label="Acción">
                <button onclick="borrarRegistro('${dato.key}')" class="text-red-500 font-bold text-xs uppercase">Borrar</button>
            </td>
        `;
        list.appendChild(fila);
      });
    }

    function borrarRegistro(key) {
        if(confirm("¿Eliminar registro?")) dniRef.child(key).remove();
    }

    function calcularNacimiento() {
      const dniNum = parseInt(document.getElementById("dniInput").value, 10);
      const res = document.getElementById("resultado");
      if (isNaN(dniNum)) return;
      
      const datos = datosCompletos.sort((a, b) => a.dni - b.dni);
      const antes = datos.filter(d => d.dni <= dniNum).pop();
      const despues = datos.find(d => d.dni > dniNum);

      if (!antes || !despues) {
          res.innerHTML = `<span class="text-cyan-500">Fuera de rango o datos insuficientes</span>`;
          return;
      }

      const prop = (dniNum - antes.dni) / (despues.dni - antes.dni);
      const fecha = new Date(antes.fecha.getTime() + prop * (despues.fecha.getTime() - antes.fecha.getTime()));
      
      res.innerHTML = `
        <div class="text-slate-400 text-sm mb-1">DNI: ${dniNum.toLocaleString()}</div>
        <div class="text-cyan-500">${fecha.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' })}</div>
        <div class="text-white text-2xl mt-2">${new Date().getFullYear() - fecha.getFullYear()} AÑOS</div>
      `;
    }
  </script>
</body>
</html>
