<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Códigos Armonizados y Nacionales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 text-slate-200 h-[100dvh] w-full flex flex-col overflow-x-hidden pt-0">

    <header class="min-h-[5rem] py-3 md:py-0 md:h-28 bg-slate-900 w-full border-b border-slate-800 flex items-center justify-between px-2 md:px-8 shadow-md sticky top-0 z-[1000] gap-2">
      <img src="logogad.png" onerror="this.onerror=null; this.src='../ASSETS/logogad.png';" alt="GAD LOGO" class="h-[64px] w-[64px] md:h-[112px] md:w-[112px] drop-shadow-md flex-shrink-0">
      
      <div class="text-center flex-1">
        <h1 class="text-[15px] md:text-3xl font-black text-white tracking-wider uppercase leading-tight" id="headerTitle">
          CÓDIGOS ARMONIZADOS<br class="md:hidden"> Y NACIONALES
        </h1>
        <h2 class="text-cyan-500 font-bold tracking-widest uppercase text-[12px] md:text-sm mt-1 leading-tight">
          Grupo de Análisis Documental
        </h2>
      </div>

      <img src="t4c.png" onerror="this.onerror=null; this.src='../ASSETS/t4c.png';" alt="T4C" class="h-[56px] w-[56px] md:h-[96px] md:w-[96px] drop-shadow-md flex-shrink-0">
    </header>

    <main class="flex-1 overflow-y-auto w-full flex flex-col items-center pb-8">
        <p class="text-center mt-6 px-4 text-slate-400">
            Introduce un código o palabras clave para buscar su significado.
        </p>

        <div class="w-11/12 max-w-3xl mt-4">
            <p class="text-center mb-2 text-cyan-500 font-bold">
                Introduce el código para buscar su significado:
            </p>
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Ej: 01.05 ⏎ (Buscar o Intro)" 
                autocomplete="off"
                class="search-input w-full p-3 text-base bg-slate-800 border border-slate-700 text-slate-200 rounded-md text-center focus:outline-none focus:ring-2 focus:ring-cyan-500 shadow-inner placeholder:italic placeholder:text-slate-500"
            >
            <div class="flex gap-4 mt-4">
                <button 
                    id="btnBuscarCodigo"
                    class="w-1/2 bg-cyan-600 text-white font-bold py-3 rounded-md hover:bg-cyan-500 transition border border-cyan-500 shadow-md"
                >
                    Buscar Código
                </button>
                <button 
                    id="btnLimpiar1"
                    class="w-1/2 bg-slate-700 text-slate-200 font-bold py-3 rounded-md hover:bg-slate-600 transition border border-slate-600 shadow-md"
                >
                    Limpiar
                </button>
            </div>
        </div>

        <div class="w-11/12 max-w-3xl mt-6">
            <p class="text-center mb-2 text-cyan-500 font-bold">
                O introduce palabras clave para buscar códigos:
            </p>
            <input 
                type="text" 
                id="inverseSearchInput" 
                placeholder="Ej: gafas ⏎ (Buscar o Intro)" 
                autocomplete="off"
                class="w-full p-3 text-base bg-slate-800 border border-slate-700 text-slate-200 rounded-md text-center focus:outline-none focus:ring-2 focus:ring-cyan-500 shadow-inner placeholder:italic placeholder:text-slate-500"
            >
            <div class="flex gap-4 mt-4">
                <button 
                    id="btnBuscarInverso"
                    class="w-1/2 bg-slate-700 text-white font-bold py-3 rounded-md hover:bg-slate-600 transition border border-slate-600 shadow-md"
                >
                    Buscar Concepto
                </button>
                <button 
                    id="btnLimpiar2"
                    class="w-1/2 bg-slate-700 text-slate-200 font-bold py-3 rounded-md hover:bg-slate-600 transition border border-slate-600 shadow-md"
                >
                    Limpiar
                </button>
            </div>
        </div>

        <div id="resultado" class="mt-8 w-11/12 max-w-3xl text-left">
            <div class="result-box-container">
                <p class="text-slate-500 text-center italic">
                    El significado del código o los códigos coincidentes aparecerán aquí.
                </p>
            </div>
        </div>

        <div class="w-11/12 max-w-3xl mt-8">
            <button 
                id="btnVerTodos"
                class="w-full bg-indigo-600/50 text-indigo-300 font-bold py-3 rounded-md hover:bg-indigo-600/80 hover:text-white transition border border-indigo-500 shadow-md"
            >
                Ver Todos los Códigos Registrados
            </button>
        </div>

        <div class="mt-8 flex justify-center w-11/12 max-w-3xl">
            <button onclick="window.location.href='index.html'"
                    class="w-full p-4 bg-slate-800 text-cyan-500 border border-slate-700 font-bold rounded-lg shadow-md transition hover:bg-slate-700 hover:text-cyan-400">
                MENÚ PRINCIPAL
            </button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
