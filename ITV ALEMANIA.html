<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Pegatina TÜV Alemania</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .listado-container {
      max-height: 300px;
      overflow-y: auto;
    }
    /* Estilo para el contenedor del logo y el texto del año */
    .logo-container {
      position: relative;
      display: inline-block;
      width: 96px; /* Ancho del logo */
      height: auto;
      margin: 10px auto;
    }
    .logo-container img {
      width: 100%;
      height: auto;
      display: block;
    }
    .logo-container .year-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 900; /* Negrita intensa */
      color: black;
      font-size: 1rem; /* Tamaño de fuente reducido para un ajuste perfecto */
      line-height: 1; /* Asegura un buen centrado vertical */
      font-family: 'Arial Black', 'Helvetica', sans-serif; /* Fuente similar a la de la pegatina */
    }
    .arrow {
        cursor: pointer;
        display: inline-block;
        font-size: 2rem;
        user-select: none;
        padding: 0 10px;
        color: #06b6d4; /* cyan-500 */
    }
    .arrow:hover {
        color: #0891b2; /* cyan-600 */
    }

    /* Adaptación de Textos de Ayuda y Firebase al Dark Mode */
    #helpContent [class*="bg-"], #helpContent [style*="background"] { background-color: #0f172a !important; border-color: #334155 !important; }
    #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
    #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

    /* Zoom de miniaturas sin cortes (Solo PC) */
    td, tr { position: static !important; }
    .results-container { overflow: visible !important; }
    @media (hover: hover) and (pointer: fine) { 
        .thumbnail-img:hover { 
            transform: scale(4); 
            z-index: 9999 !important; 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            border-color: #06b6d4; 
        } 
    }

    /* Responsive (Móvil) - Conversión de tablas a tarjetas */
    @media (max-width: 768px) {
        table thead { display: none; }
        table tr {
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #334155;
        }
        table td { border: none; padding: 0.5rem 0; color: #e2e8f0; }
        table td img.thumbnail-img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col pb-16 text-slate-200">

  <header class="min-h-[5rem] py-3 md:py-0 md:h-28 bg-slate-900 w-full border-b border-slate-800 flex items-center justify-between px-2 md:px-8 shadow-md sticky top-0 z-[1000] gap-2">
    <img src="logogad.png" onerror="this.onerror=null; this.src='../ASSETS/logogad.png';" alt="GAD LOGO" class="h-[64px] w-[64px] md:h-[112px] md:w-[112px] drop-shadow-md flex-shrink-0">
    
    <div class="text-center flex-1">
      <h1 class="text-[15px] md:text-3xl font-black text-white tracking-wider uppercase leading-tight" id="headerTitle">
        VERIFICACIÓN PEGATINA<br class="md:hidden"> TÜV ALEMANIA
      </h1>
      <h2 class="text-cyan-500 font-bold tracking-widest uppercase text-[12px] md:text-sm mt-1 leading-tight">
        Grupo de Análisis Documental
      </h2>
    </div>

    <img src="t4c.png" onerror="this.onerror=null; this.src='../ASSETS/t4c.png';" alt="T4C" class="h-[56px] w-[56px] md:h-[96px] md:w-[96px] drop-shadow-md flex-shrink-0">
  </header>
  
  <h2 class="text-cyan-500 text-center mt-6 px-4 font-bold tracking-widest uppercase text-sm">
    Consulta el color de la pegatina por año
  </h2>
  
  <div class="w-11/12 max-w-md mx-auto mt-4 flex justify-center">
    <img src="logoitvalemania.png" alt="Logo ITV Alemania" class="w-full h-auto drop-shadow-md">
  </div>

  <div class="bg-slate-800 border border-slate-700 shadow-lg rounded-lg p-6 mt-6 text-center w-11/12 max-w-md mx-auto">
    <h3 class="text-lg font-semibold mb-4 text-slate-200">Consultar por Año</h3>
    <input 
      type="number" 
      id="inputAnio" 
      placeholder="Ej: 2025" 
      class="block mx-auto p-3 text-base w-full border border-slate-700 bg-slate-900 text-slate-200 rounded-md text-center focus:outline-none focus:ring-2 focus:ring-cyan-500 placeholder-slate-500"
    />
    <button 
      onclick="consultarPorAnio()" 
      class="block mx-auto mt-4 w-full bg-cyan-600 text-white font-bold py-3 rounded-md hover:bg-cyan-500 transition duration-300"
    >
      Consultar Color
    </button>
    <div id="outputColor" class="mt-4 text-slate-200 text-center w-full mx-auto font-bold"></div>
  </div>

  <script>
    const coloresAnios = {
      2023: { color: "Rosa", hex: "#e75480" },
      2024: { color: "Verde", hex: "#008000" },
      2025: { color: "Naranja", hex: "#ffa500" },
      2026: { color: "Azul", hex: "#0000ff" },
      2027: { color: "Amarillo", hex: "#ffff00" },
      2028: { color: "Rojo", hex: "#ff0000" }
    };
    
    let currentAnio = new Date().getFullYear();

    function consultarPorAnio() {
      const inputAnio = document.getElementById("inputAnio").value;
      
      if (!inputAnio || isNaN(inputAnio)) {
        document.getElementById("outputColor").innerHTML = "<p class='text-red-500'>Por favor, introduce un año válido.</p>";
        return;
      }
      
      currentAnio = parseInt(inputAnio);
      renderResult(currentAnio);
    }
    
    function changeAnio(step) {
        currentAnio += step;
        renderResult(currentAnio);
    }

    function renderResult(anio) {
      const outputColor = document.getElementById("outputColor");
      outputColor.innerHTML = "";

      const inicioCiclo = 2023;
      const longitudCiclo = 6;
      const anioMinimoBusqueda = 2000;
      
      if (anio < anioMinimoBusqueda) {
        outputColor.innerHTML = `<p class='text-red-500'>La búsqueda no puede ser anterior al año ${anioMinimoBusqueda}.</p>`;
        return;
      }
      
      let anioAjustado = (anio - inicioCiclo) % longitudCiclo;
      if (anioAjustado < 0) {
        anioAjustado += longitudCiclo;
      }

      const anioBase = inicioCiclo + anioAjustado;
      const datos = coloresAnios[anioBase];
      const anioCorto = String(anio).slice(-2);

      if (datos) {
        outputColor.innerHTML = `
          <div class="flex items-center justify-center">
            <span class="arrow" onclick="changeAnio(-1)">&lt;</span>
            <div class="flex-1 text-center">
                <p class="text-cyan-400 mb-2">El color para el año ${anio} es: <strong class="text-white">${datos.color.toUpperCase()}</strong></p>
                <div class="logo-container">
                    <img src="logo${datos.color.toLowerCase()}.png" alt="Logo de color ${datos.color}">
                    <span class="year-text">${anioCorto}</span>
                </div>
            </div>
            <span class="arrow" onclick="changeAnio(1)">&gt;</span>
          </div>
        `;
      } else {
        outputColor.innerHTML = "<p class='text-red-500'>No se encontró información para ese año.</p>";
      }
    }

    // Habilitar la tecla Intro en el campo de input
    document.getElementById("inputAnio").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        consultarPorAnio();
      }
    });

    // Cargar automáticamente el año actual al abrir la página
    window.onload = function() {
        renderResult(currentAnio);
    };
  </script>
</body>
</html>
