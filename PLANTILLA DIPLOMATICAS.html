<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICIO EUIPO GAD</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- ESTILOS BASE --- */
        * { box-sizing: border-box; }
        body { background-color: #374151; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        
        .page-a4 {
            width: 210mm; height: 297mm; background: white; margin: 20px auto; padding: 10mm;
            box-shadow: 0 0 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .form-container { border: 2px solid black; width: 100%; display: flex; flex-direction: column; font-size: 11px; flex-shrink: 0; }
        .acta-row { display: flex; width: 100%; border-bottom: 1px solid black; position: relative; }
        .acta-row:last-child { border-bottom: none; }

        .field-container { position: relative; display: flex; flex-direction: column; padding: 2px 5px; min-width: 0; border-right: 1px solid black; justify-content: center; overflow: hidden; text-align: center; }
        .field-container.is-last { border-right: none; flex-grow: 1 !important; width: auto !important; }

        .label { font-size: 10px; font-weight: 800; margin-bottom: 1px; color: #000; white-space: pre-wrap; outline: none; text-align: center; }
        .input-data { width: 100%; font-family: 'Courier New', monospace; font-weight: bold; font-size: 13px; outline: none; background: transparent; border: none; padding: 0; color: #000; text-transform: uppercase; text-align: center; }
        
        .section-bar { background-color: #e5e7eb; border-bottom: 1px solid black; font-weight: 800; text-align: center; font-size: 11px; padding: 4px 8px; width: 100%; position: relative; font-style: italic; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        /* TEXTO LEGAL AUMENTADO */
        .legal-text { 
            font-size: 13.5px; 
            text-align: justify; 
            line-height: 1.6; 
            color: #000; 
            margin-top: 20px; 
            margin-bottom: 20px; 
            outline: none; 
        }
        .legal-text p { margin-bottom: 14px; text-indent: 20px; }
        .legal-bold { font-weight: bold; }
        
        .fill-space { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; }

        .header-text { font-size: 10px; line-height: 1.2; text-align: center; color: #000; outline: none; }
        .header-title { font-weight: bold; font-size: 12px; margin-bottom: 2px; outline: none; }

        .editing .field-container { background: rgba(59, 130, 246, 0.05); }
        .editing .section-bar { background: #dbeafe; cursor: text; }
        .editing .editable-block { border: 1px dashed blue; background-color: #eff6ff; cursor: text; }
        
        .resizer { position: absolute; right: -5px; top: 0; bottom: 0; width: 10px; cursor: col-resize; z-index: 50; display: flex; justify-content: center; align-items: center; }
        .resizer::after { content: ''; width: 2px; height: 100%; background: #3b82f6; display: none; }
        .editing .resizer:hover::after { display: block; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body * { visibility: hidden; }
            .page-a4, .page-a4 * { visibility: visible; }
            .page-a4 { position: absolute; left: 0; top: 0; width: 210mm !important; height: 297mm !important; margin: 0 !important; padding: 10mm !important; box-shadow: none !important; border: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-print, .resizer { display: none !important; }
            .input-data { color: #000 !important; }
            .editing .editable-block { border: none; background: transparent; }
            .section-bar { background-color: #e5e7eb !important; }
            .print-only { display: flex !important; }
            /* CLASE PARA OCULTAR FILAS VACIAS AL IMPRIMIR */
            .print-hidden-row { display: none !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const EditableBlock = ({ html, tagName = "div", className, isEditMode, onChange }) => {
            const ContentTag = tagName;
            return (
                <ContentTag
                    className={`editable-block ${className || ''}`}
                    contentEditable={isEditMode}
                    suppressContentEditableWarning={true}
                    dangerouslySetInnerHTML={{ __html: html }}
                    onBlur={(e) => onChange && onChange(e.target.innerHTML)}
                />
            );
        };

        const EditableLabel = ({ text, onChange, isEditMode }) => {
            return (
                <div className="editable-block label" contentEditable={isEditMode} suppressContentEditableWarning={true} onBlur={(e) => onChange(e.target.innerText)}>
                    {text}
                </div>
            );
        };

        const App = () => {
            const storageKey = 'oficio_euipo_gad_v2';
            const logoKey = 'logos_euipo_gad_v3';

            const initialTexts = {
                header_info: `<div class="header-title">EXCMO. AYUNTAMIENTO DE ALICANTE</div>
                              <div class="header-title">POLICÍA LOCAL</div>
                              <div class="header-text mt-2 font-bold">Grupo de Análisis Documental</div>
                              <div class="header-text font-bold">Unidad Judicial de Tráfico</div>
                              <div class="header-text mt-1">Av. Julián Besteiro 15</div>
                              <div class="header-text text-blue-800 underline">Email: policia.gad@alicante.es</div>
                              <div class="header-text">TEL: +34629111387 - Central PL 965107200</div>`,
                
                title: "OFICIO DE SOLICITUD DATOS MATRÍCULAS EUIPO",
                
                sigAgente: "EL AGENTE SOLICITANTE:",
            };

            const initialTemplate = [
                // Sección Datos Solicitud
                { type: 'section', id: 's0', title: 'DATOS DE LA SOLICITUD' },
                { type: 'row', id: 'r0', fields: [{id: 'fecha_oficio', label: 'Fecha de solicitud:', width: 50}, {id: 'agente', label: 'NIP Agente Actuante:', width: 50}] },
                
                // Sección Matrículas (Hasta 5)
                { type: 'section', id: 's1', title: 'MATRÍCULAS SOLICITADAS' },
                { type: 'row', id: 'r1', fields: [{id: 'matricula_1', label: 'Matrícula 1:', width: 100}] },
                { type: 'row', id: 'r2', fields: [{id: 'matricula_2', label: 'Matrícula 2:', width: 100}] },
                { type: 'row', id: 'r3', fields: [{id: 'matricula_3', label: 'Matrícula 3:', width: 100}] },
                { type: 'row', id: 'r4', fields: [{id: 'matricula_4', label: 'Matrícula 4:', width: 100}] },
                { type: 'row', id: 'r5', fields: [{id: 'matricula_5', label: 'Matrícula 5:', width: 100}] }
            ];

            const [template, setTemplate] = React.useState(initialTemplate);
            const [texts, setTexts] = React.useState(initialTexts);
            const [formData, setFormData] = React.useState({});
            const [actas, setActas] = React.useState({});
            const [isEditMode, setIsEditMode] = React.useState(false);
            const [dragState, setDragState] = React.useState(null);
            const [logos, setLogos] = React.useState({ left: './ASSETS/judicial.png', right: './ASSETS/logogad.png' });            
            // Estado para controlar la ventana de ayuda
            const [showHelp, setShowHelp] = React.useState(false);

            React.useEffect(() => {
                const stored = JSON.parse(localStorage.getItem(storageKey) || "{}");
                setActas(stored);
                const l = JSON.parse(localStorage.getItem(logoKey));
                if(l) setLogos(l);
                autoFillData();
            }, []);

            const autoFillData = () => {
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const hour = now.getHours();
                let agente = (hour >= 6 && hour < 14) ? "G-118" : "G-279";
                const todayStr = `${day}/${month}/${year}`;

                setFormData(prev => {
                    if (Object.keys(prev).length === 0) {
                        return {
                            fecha_oficio: todayStr,
                            agente: agente,
                            matricula_1: "",
                            matricula_2: "",
                            matricula_3: "",
                            matricula_4: "",
                            matricula_5: ""
                        };
                    }
                    return prev;
                });
            };

            // Lógica Edición y Redimensionado
            React.useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!dragState) return; e.preventDefault();
                    const row = document.getElementById(`row-${dragState.rIdx}`);
                    if (!row) return;
                    const deltaPixels = e.clientX - dragState.startX;
                    const deltaPercent = (deltaPixels / row.offsetWidth) * 100;
                    const newWidth = Math.max(5, dragState.startW + deltaPercent);
                    setTemplate(prev => {
                        const newT = [...prev]; newT[dragState.rIdx].fields[dragState.fIdx].width = newWidth;
                        return newT;
                    });
                };
                const handleMouseUp = () => setDragState(null);
                if (dragState) { document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp); }
                return () => { document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); };
            }, [dragState]);

            const startResize = (e, rIdx, fIdx, w) => { e.preventDefault(); e.stopPropagation(); setDragState({rIdx, fIdx, startX: e.clientX, startW: w}); };
            const updateLabel = (rIdx, fIdx, newText) => { setTemplate(prev => { const newT = [...prev]; newT[rIdx].fields[fIdx].label = newText; return newT; }); };
            const updateText = (key, newHtml) => { setTexts(prev => ({...prev, [key]: newHtml})); };
            const updateSectionTitle = (rIdx, newTitle) => { setTemplate(prev => { const newT = [...prev]; newT[rIdx].title = newTitle; return newT; }); };
            
            const handleChange = (id, value) => { 
                let newValue = value;
                if (id === 'fecha_oficio') {
                    const cleanValue = value.replace(/[^0-9]/g, ''); 
                    if (cleanValue.length === 8) newValue = `${cleanValue.substring(0, 2)}/${cleanValue.substring(2, 4)}/${cleanValue.substring(4, 8)}`;
                    else if (cleanValue.length < 8) newValue = value.replace(/[^0-9/-]/g, ''); 
                    if (newValue.length > 10) newValue = newValue.slice(0, 10);
                }
                setFormData(prev => ({ ...prev, [id]: newValue })); 
            };
            
            // Función Guardar
            const saveActa = () => { 
                const matriculasArray = [
                    formData.matricula_1,
                    formData.matricula_2,
                    formData.matricula_3,
                    formData.matricula_4,
                    formData.matricula_5
                ].filter(m => m && m.trim() !== '');

                const suffix = matriculasArray.length > 0 ? matriculasArray.join("-") : Date.now();
                const id = prompt("Nombre del guardado:", `EUIPO ${suffix}`); 

                if(!id) return; 
                const n = {...actas, [id]: {id, data: formData, template, texts}}; 
                setActas(n); 
                localStorage.setItem(storageKey, JSON.stringify(n)); 
            };
            
            const loadActa = (id) => { const a = actas[id]; if(a) { setFormData(a.data); if(a.template) setTemplate(a.template); if(a.texts) setTexts(a.texts); } };

            // NUEVO: Borrar un acta individual
            const deleteActa = (id) => {
                if (window.confirm(`¿Estás seguro de que deseas eliminar la solicitud:\n\n"${id}"?`)) {
                    const newActas = { ...actas };
                    delete newActas[id];
                    setActas(newActas);
                    localStorage.setItem(storageKey, JSON.stringify(newActas));
                }
            };

            // NUEVO: Limpiar todas las actas
            const clearAllActas = () => {
                if (window.confirm('⚠️ ¿Estás seguro de que deseas ELIMINAR TODAS las solicitudes guardadas?\n\nEsta acción NO se puede deshacer.')) {
                    setActas({});
                    localStorage.setItem(storageKey, JSON.stringify({}));
                }
            };

            const handleLogoUpload = (e, key) => { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = (ev) => { const newLogos = {...logos, [key]: ev.target.result}; setLogos(newLogos); localStorage.setItem(logoKey, JSON.stringify(newLogos)); }; r.readAsDataURL(f); } };

            // FUNCION IMPRIMIR (Cambia el nombre sugerido del PDF)
            const handlePrint = () => {
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const dateStr = `${day}-${month}-${year}`;

                // Recopilar matrículas rellenadas
                const matriculasArray = [
                    formData.matricula_1,
                    formData.matricula_2,
                    formData.matricula_3,
                    formData.matricula_4,
                    formData.matricula_5
                ].filter(m => m && m.trim() !== '');

                // Construir el string de matrículas
                let matriculasStr = "";
                if (matriculasArray.length > 0) {
                    matriculasStr = ` - ${matriculasArray.join('-')}`;
                }

                const originalTitle = document.title;
                const newTitle = `OFICIO EUIPO GAD - ${dateStr}${matriculasStr}`;
                
                // Cambiamos el título de la pestaña temporalmente para engañar al navegador
                document.title = newTitle;
                
                window.print();
                
                // Restaurar el título original después de imprimir
                setTimeout(() => {
                    document.title = originalTitle;
                }, 1000);
            };

            // FUNCION ABRIR OUTLOOK
            const enviarCorreoDGT = () => {
                const agente = formData.agente || "";
                const correoDGT = "diplomaticas.jptm@dgt.es";
                const asunto = "Solicitud de colaboración";
                
                // Recopilar matrículas rellenadas
                const matriculasArray = [
                    formData.matricula_1,
                    formData.matricula_2,
                    formData.matricula_3,
                    formData.matricula_4,
                    formData.matricula_5
                ].filter(m => m && m.trim() !== '');

                let matriculasCuerpo = "";
                if (matriculasArray.length > 0) {
                    matriculasCuerpo = "\n\nMatrículas solicitadas:\n- " + matriculasArray.join("\n- ");
                }

                const cuerpoMensaje = `Por medio del presente se solicitan los datos de los titulares, así como marca y modelo, de los vehículos relacionados en oficio adjunto, todos ellos con placas de matrícula pertenecientes a la EUIPO, siendo necesaria la identificación de los titulares a fin de poder notificar las correspondientes denuncias por diversas infracciones de tráfico.${matriculasCuerpo}\n\nEl Agente ${agente}`;

                const mailLink = `https://outlook.office.com/mail/policia.gad@alicante.es/deeplink/compose?to=${correoDGT}&subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpoMensaje)}`;
                window.open(mailLink, '_blank');
            };

            const renderFieldContent = (field) => {
                return <input className="input-data" value={formData[field.id] || ''} onChange={(e)=>handleChange(field.id, e.target.value)} />;
            };

            // Texto legal dinámico más formal y extenso
            const bodyHtml = `
                <p>El agente con número de identificación profesional <span class="legal-bold">${formData.agente || 'G-XXX'}</span>, adscrito al Grupo de Análisis Documental (G.A.D.) de la Policía Local de Alicante, en el ejercicio de las funciones que le son propias y de acuerdo con la legislación vigente en materia de tráfico, circulación de vehículos a motor y seguridad vial, por medio del presente escrito expone y solicita:</p>
                <p>Que, habiéndose detectado diversas presuntas infracciones a las normativas de ordenación del tráfico y estacionamiento en el término municipal de Alicante por parte de vehículos que ostentan placas de matrícula pertenecientes a la Oficina de Propiedad Intelectual de la Unión Europea (EUIPO), resulta imprescindible para el correcto desarrollo y conclusión de los expedientes sancionadores incoados la plena identificación de los responsables de dichos vehículos.</p>
                <p>Por consiguiente, y al amparo del deber de colaboración y asistencia recíproca entre administraciones y organismos públicos, se solicita formalmente que se facilite a esta Unidad Policial la información relativa a los datos de filiación completa de los titulares, así como la marca y modelo correspondientes a los vehículos cuyas matrículas se relacionan en el presente documento, a fin de proceder a la preceptiva notificación legal de las denuncias correspondientes, garantizando en todo momento el tratamiento confidencial de los datos suministrados.</p>
            `;

            return (
                <div className="flex h-screen relative">
                    {/* BARRA LATERAL */}
                    <div className="w-64 bg-gray-900 text-white p-4 no-print flex flex-col gap-2 overflow-y-auto shrink-0 border-r border-gray-700">
                        <h2 className="text-lg font-bold text-blue-400">📂 Solicitudes EUIPO</h2>
                        
                        <div className="flex flex-col gap-2 mb-4">
                            <button onClick={()=>{setFormData({}); setTemplate(initialTemplate); autoFillData()}} className="bg-green-600 p-2 rounded text-xs font-bold hover:bg-green-700 w-full transition-colors">
                                NUEVA SOLICITUD
                            </button>
                            {/* BOTÓN LIMPIAR TODAS */}
                            {Object.keys(actas).length > 0 && (
                                <button onClick={clearAllActas} className="bg-red-900/50 text-red-400 border border-red-800 p-1.5 rounded text-xs font-bold hover:bg-red-800 hover:text-white transition-colors flex items-center justify-center gap-2">
                                    <i className="fas fa-trash-alt"></i> Limpiar todas
                                </button>
                            )}
                        </div>

                        {/* LISTA DE ACTAS GUARDADAS */}
                        <div className="flex-1 space-y-2">
                            {Object.keys(actas).map(k => (
                                <div key={k} className="flex items-center justify-between p-2 bg-gray-800 hover:bg-gray-700 rounded border border-gray-700 group transition-colors">
                                    <div className="truncate flex-1 cursor-pointer text-xs font-semibold" onClick={()=>loadActa(k)} title={k}>
                                        {k}
                                    </div>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); deleteActa(k); }} 
                                        className="text-gray-500 hover:text-red-500 ml-2 px-1 transition-colors" 
                                        title="Eliminar solicitud"
                                    >
                                        <i className="fas fa-trash"></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* ZONA PRINCIPAL */}
                    <div className="flex-1 bg-gray-200 flex flex-col overflow-hidden">
                        
                        {/* BARRA DE HERRAMIENTAS */}
                        <div className="bg-white p-2 shadow flex justify-between items-center no-print z-50 shrink-0 h-14">
                            <div className="font-bold text-gray-700 text-sm flex gap-2"><span>SOLICITUD DATOS MATRICULAS EUIPO</span>{isEditMode && <span className="bg-yellow-100 text-yellow-800 px-2 rounded border border-yellow-300">DISEÑO</span>}</div>
                            <div className="flex gap-2">
                                <button onClick={()=>setShowHelp(true)} className="bg-yellow-500 text-white px-3 py-1 rounded text-sm font-bold hover:bg-yellow-600 flex items-center gap-1" title="Instrucciones">
                                    ❓ Ayuda
                                </button>
                                <button onClick={()=>setIsEditMode(!isEditMode)} className="bg-gray-100 text-gray-600 px-3 py-1 rounded text-sm border hover:bg-gray-200">Editar</button>
                                <button onClick={saveActa} className="bg-blue-600 text-white px-4 py-1 rounded text-sm font-bold hover:bg-blue-700">Guardar</button>
                                <button onClick={handlePrint} className="bg-gray-800 text-white px-4 py-1 rounded text-sm font-bold hover:bg-gray-900">Imprimir PDF</button>
                                <button onClick={enviarCorreoDGT} className="bg-purple-600 text-white px-4 py-1 rounded text-sm font-bold hover:bg-purple-700 flex items-center gap-2">
                                    📧 Enviar petición
                                </button>
                            </div>
                        </div>

                        {/* HOJA A4 */}
                        <div className="flex-1 overflow-auto p-8 flex justify-center bg-gray-500">
                            <div className={`page-a4 ${isEditMode?'editing':''}`}>
                                
                                {/* CABECERA LOGOS */}
                                <div className="flex justify-between items-start mb-2 relative">
                                    <div className="w-24 h-24 relative cursor-pointer hover:bg-gray-50 group flex items-center justify-center">
                                        {!logos.left ? <span className="text-[9px] text-gray-400">judicial.png</span> : <img src={logos.left} className="w-full h-full object-contain"/>}
                                        <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e)=>handleLogoUpload(e,'left')}/>
                                    </div>
                                    <div className="flex-1 px-2 text-center">
                                        <EditableBlock html={texts.header_info} isEditMode={isEditMode} onChange={(val)=>updateText('header_info', val)} />
                                    </div>
                                    <div className="w-24 h-24 relative cursor-pointer hover:bg-gray-50 group flex items-center justify-center">
                                        {!logos.right ? <span className="text-[9px] text-gray-400">logogad.png</span> : <img src={logos.right} className="w-full h-full object-contain"/>}
                                        <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e)=>handleLogoUpload(e,'right')}/>
                                    </div>
                                </div>

                                <EditableBlock tagName="div" className="text-center font-bold text-sm uppercase bg-gray-100 py-1 border-2 border-black border-solid mb-3" html={texts.title} isEditMode={isEditMode} onChange={(val) => updateText('title', val)} />

                                {/* CAMPOS DEL FORMULARIO */}
                                <div className="form-container mb-2 flex-shrink-0">
                                    {template.map((row, rIdx) => {
                                        if (row.type === 'section') {
                                            return <div key={row.id} className="section-bar" contentEditable={isEditMode} suppressContentEditableWarning onBlur={(e) => updateSectionTitle(rIdx, e.target.innerText)}>{row.title}</div>;
                                        }

                                        // LOGICA PARA OCULTAR FILAS DE MATRICULAS VACIAS AL IMPRIMIR
                                        const isMatriculaRow = row.fields[0].id.startsWith('matricula_');
                                        const matriculaValue = formData[row.fields[0].id];
                                        const hideInPrintClass = (isMatriculaRow && (!matriculaValue || matriculaValue.trim() === '')) ? 'print-hidden-row' : '';

                                        return (
                                            <div key={row.id} id={`row-${rIdx}`} className={`acta-row ${hideInPrintClass}`}>
                                                {row.fields.map((f, fIdx) => {
                                                    const isLast = fIdx === row.fields.length - 1;
                                                    return (
                                                        <div key={f.id} className={`field-container ${isLast ? 'is-last' : ''}`} style={{width: isLast ? 'auto' : `${f.width}%`}}>
                                                            <EditableLabel text={f.label} isEditMode={isEditMode} onChange={(val)=>updateLabel(rIdx, fIdx, val)} />
                                                            {renderFieldContent(f)}
                                                            {isEditMode && !isLast && <div className="resizer" onMouseDown={(e)=>startResize(e, rIdx, fIdx, f.width)}></div>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* TEXTO LEGAL */}
                                <div className="legal-text fill-space" dangerouslySetInnerHTML={{ __html: bodyHtml }}></div>

                                {/* ZONA INFERIOR FIRMAS (30% Agente / 70% Digital) */}
                                <div className="mt-auto flex h-52 border-t-2 border-black pt-4 relative flex-shrink-0">
                                    
                                    {/* COLUMNA IZQUIERDA: AGENTE MANUSCRITO */}
                                    <div className="w-[30%] flex flex-col pr-4 border-r-2 border-gray-300 border-dashed justify-between gap-10 pt-2 pb-4">
                                        <div className="flex flex-col">
                                            <div className="text-[11px] font-bold text-center">
                                                <EditableBlock tagName="span" html={texts.sigAgente} isEditMode={isEditMode} onChange={(val) => updateText('sigAgente', val)} /> {formData.agente}
                                            </div>
                                        </div>
                                        <div className="border-t border-black pt-1 text-[11px] text-center">
                                            Fdo.
                                        </div>
                                    </div>

                                    {/* COLUMNA DERECHA: FIRMA DIGITAL */}
                                    <div className="w-[70%] flex flex-col items-center justify-center pl-2 h-full pb-2 relative">
                                        
                                        {/* VERSIÓN PANTALLA */}
                                        <div className="w-full h-full border-2 border-dashed border-gray-400 rounded bg-gray-50 flex items-center justify-center text-center p-2 no-print">
                                            <span className="text-gray-400 text-sm font-bold transform -rotate-12 select-none">
                                                ESPACIO RESERVADO<br/>PARA FIRMA DIGITAL
                                            </span>
                                        </div>

                                        {/* VERSIÓN IMPRESIÓN - BAJADA 5MM */}
                                        <div className="w-full h-full flex-col justify-end items-center print-only hidden">
                                            <div className="text-[9px] text-gray-500 w-3/4 text-center border-t border-gray-400 pt-1 mb-0 transform translate-y-[5mm]">
                                                Espacio reservado para firma digital
                                            </div>
                                        </div>

                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    {/* MODAL DE AYUDA */}
                    {showHelp && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-[100] no-print backdrop-blur-sm">
                            <div className="bg-white p-6 rounded-lg shadow-2xl max-w-md w-full border-t-4 border-blue-600">
                                <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <span>ℹ️</span> Instrucciones de Envío
                                </h3>
                                <div className="text-sm text-gray-700 space-y-3">
                                    <p>
                                        Al pulsar el botón <strong className="text-purple-700 bg-purple-100 px-1 rounded">Enviar petición</strong> se abrirá automáticamente Outlook Web con el correo y el texto redactados.
                                    </p>
                                    <div className="bg-yellow-50 p-3 rounded border border-yellow-200">
                                        <p className="font-bold text-yellow-800 mb-2">¡IMPORTANTE ANTES DE ENVIAR EL CORREO!</p>
                                        <ul className="list-disc pl-5 space-y-1 text-yellow-900">
                                            <li>Haz clic primero en <strong>Imprimir PDF</strong> para guardar el archivo en tu equipo. Al guardar, verás que el nombre ya viene listo con la fecha y las matrículas incluidas.</li>
                                            <li>Abre el documento descargado con <strong>Nuance Power PDF</strong> y fírmalo digitalmente en el espacio reservado.</li>
                                            <li>Vuelve a la pestaña del correo que se abrió y <strong>adjunta manualmente</strong> el PDF que acabas de firmar.</li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-end">
                                    <button onClick={() => setShowHelp(false)} className="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors">
                                        Entendido
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
