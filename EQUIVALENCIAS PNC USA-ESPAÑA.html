    <style>
        /* Adaptación de Textos de Ayuda y Firebase al Dark Mode */
        #helpContent [class*="bg-"], #helpContent [style*="background"] { background-color: #0f172a !important; border-color: #334155 !important; }
        #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
        #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

        /* Zoom de miniaturas sin cortes (Solo PC) */
        td, tr { position: static !important; }
        .results-container { overflow: visible !important; }
        @media (hover: hover) and (pointer: fine) { 
            .thumbnail-img:hover { 
                transform: scale(4); 
                z-index: 9999 !important; 
                position: relative; 
                box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
                border-color: #06b6d4; 
            } 
        }

        /* Responsive Móvil: Tabla a Tarjetas */
        @media (max-width: 768px) {
            table { display: block; width: 100%; }
            thead { display: none; }
            tbody { display: block; width: 100%; }
            tr {
                display: flex;
                flex-direction: column;
                background: #1e293b;
                border-radius: 12px;
                border: 1px solid #334155;
                margin-bottom: 1rem;
                padding: 0.5rem;
                overflow: hidden;
            }
            td {
                display: block;
                width: 100%;
                border: none !important;
                padding: 0.75rem !important;
                text-align: center;
            }
            /* Diferenciar LOCAL de ESPAÑA en el modo tarjeta */
            td:first-child {
                font-weight: bold;
                color: #06b6d4;
                border-bottom: 1px solid #334155 !important;
                background: #0f172a;
            }
            td:first-child::before {
                content: "LOCAL: ";
                color: #e2e8f0;
                font-weight: normal;
            }
            td:last-child::before {
                content: "ESPAÑA: ";
                color: #06b6d4;
                font-weight: bold;
                display: block;
                margin-bottom: 0.25rem;
            }
        }
    </style>
</head>

        function mostrarCategorias() {
            const estado = document.getElementById('estados').value;
            const resultado = document.getElementById('resultado');

            if (estado && estados[estado]) {
                const categorias = estados[estado].split('\n').map(line => {
                    const [local, espana] = line.split(':');
                    return `<tr class="border-b border-slate-700 last:border-0"><td class='px-3 py-3'>${local.trim()}</td><td class='px-3 py-3'>${espana.trim()}</td></tr>`;
                }).join('');

                // Clases inyectadas actualizadas para Dark Mode GAD
                resultado.innerHTML = `
                    <h2 class="text-cyan-400 text-center text-xl font-bold mb-4 tracking-wide uppercase">${estado}</h2>
                    <div class="bg-slate-800 rounded-lg shadow-lg border border-slate-700 overflow-hidden">

                                </tr>
                            </thead>

                            </tbody>
