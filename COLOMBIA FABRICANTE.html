<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Consulta de Fabricante LC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Estilos del Input en Dark Mode */
    .input-wrapper {
      display: flex;
      align-items: center;
      border: 1px solid #334155; /* border-slate-700 */
      border-radius: 0.5rem;
      padding: 0.75rem;
      background-color: #1e293b; /* bg-slate-800 */
      transition: border-color 0.3s;
    }
    .input-wrapper:focus-within {
      border-color: #06b6d4; /* cyan-500 */
    }
    .input-prefix {
      font-weight: bold;
      color: #06b6d4; /* cyan-500 */
      margin-right: 0.5rem;
    }
    .input-number {
      border: none;
      outline: none;
      flex: 1;
      text-transform: uppercase;
      text-align: center;
      background-color: transparent;
      color: #e2e8f0; /* text-slate-200 */
      font-weight: 600;
      font-size: 1.125rem;
    }
    
    .table-responsive {
      overflow-x: auto;
    }

    /* 5. Correcciones Estructurales Obligatorias */
    /* Ayuda a prueba de Firebase (anula fondos blancos) */
    #helpContent [class*="bg-"], #helpContent [style*="background"] { 
      background-color: #0f172a !important; 
      border-color: #334155 !important; 
    }
    #helpContent, #helpContent p, #helpContent span, #helpContent li { 
      color: #e2e8f0 !important; 
    }
    #helpContent h4, #helpContent strong, #helpContent b { 
      color: #06b6d4 !important; 
      font-weight: bold !important; 
      background: transparent !important; 
    }
    
    /* Zoom de miniaturas sin cortes (Solo PC) */
    td, tr { position: static !important; }
    .results-container { overflow: visible !important; }
    @media (hover: hover) and (pointer: fine) { 
      .thumbnail-img:hover { 
        transform: scale(4); 
        z-index: 9999 !important; 
        position: relative; 
        box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
        border-color: #06b6d4; 
      } 
    }

    /* 6. Responsive (Móvil) - Tabla a Tarjetas */
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr { 
        display: block; 
        width: 100%;
      }
      thead { 
        display: none; 
      }
      tr {
        display: flex;
        flex-direction: column;
        background: #1e293b !important; /* bg-slate-800 */
        border: 1px solid #334155 !important; /* border-slate-700 */
        border-radius: 12px;
        margin-bottom: 1rem;
        padding: 1rem;
      }
      td {
        border: none !important;
        padding: 0.5rem 0 !important;
        display: flex;
        flex-direction: column;
        color: #e2e8f0 !important;
        text-align: left !important;
      }
      /* Títulos inyectados por CSS para cada celda en móvil */
      td:nth-of-type(1)::before { 
        content: "Código LC"; 
        font-weight: 700; 
        color: #06b6d4; 
        text-transform: uppercase; 
        font-size: 0.75rem; 
        margin-bottom: 0.25rem; 
      }
      td:nth-of-type(2)::before { 
        content: "Fabricante"; 
        font-weight: 700; 
        color: #06b6d4; 
        text-transform: uppercase; 
        font-size: 0.75rem; 
        margin-bottom: 0.25rem; 
      }
      /* Regla general por si hay imágenes miniatura en el futuro */
      td img, .thumbnail-img {
        width: 100%;
        height: auto;
        order: -1;
        margin-bottom: 0.5rem;
        border-radius: 0.5rem;
      }
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col pb-16 text-slate-200">

<header class="min-h-[5rem] py-3 md:py-0 md:h-28 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-2 md:px-8 shadow-md sticky top-0 z-[1000] gap-2">
  <img src="logogad.png" onerror="this.onerror=null; this.src='../ASSETS/logogad.png';" alt="GAD LOGO" class="h-[64px] w-[64px] md:h-[112px] md:w-[112px] drop-shadow-md flex-shrink-0">
  
  <div class="text-center">
    <h1 class="text-[15px] md:text-3xl font-black text-white tracking-wider uppercase leading-tight" id="headerTitle">
      CONSULTA DE<br class="md:hidden"> FABRICANTE LC<br class="md:hidden text-cyan-400"> <span class="text-cyan-400 md:text-white">COLOMBIA</span>
    </h1>
    <h2 class="text-cyan-500 font-bold tracking-widest uppercase text-[10px] md:text-sm mt-1 leading-tight">
      Grupo de Análisis Documental
    </h2>
  </div>

  <img src="t4c.png" onerror="this.onerror=null; this.src='../ASSETS/t4c.png';" alt="T4C" class="h-[56px] w-[56px] md:h-[96px] md:w-[96px] drop-shadow-md flex-shrink-0">
</header>

  <p class="text-center mt-6 px-4 text-slate-300">
      Introduce el número del código LC:
  </p>

  <div class="w-11/12 max-w-md mx-auto mt-4">
    <img src="logocolombia.png" alt="Logo Colombia" class="w-full rounded-xl shadow-lg border border-slate-700 bg-slate-800 p-2">
  </div>

  <div class="input-wrapper w-11/12 max-w-md mx-auto mt-6 shadow-md">
    <span class="input-prefix">LC</span>
    <input id="numero" type="text" class="input-number" placeholder="01" maxlength="2">
  </div>

  <button onclick="buscarFabricante()" class="block mx-auto mt-6 w-11/12 max-w-md bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg shadow-md transition-colors duration-200">
    Buscar
  </button>

  <button onclick="mostrarTodos()" class="block mx-auto mt-4 w-11/12 max-w-md bg-slate-800 border border-slate-600 hover:bg-slate-700 text-cyan-400 font-bold py-3 rounded-lg shadow-md transition-colors duration-200">
    Ver lista completa
  </button>

  <div id="resultado" class="w-11/12 max-w-md mx-auto mt-8 text-lg font-semibold text-center"></div>


  <script>
  // 1. Lógica y Arquitectura (CRÍTICO) - Intacta
  const fabricantes = {
    "LC01": "CARVAJAL (Hasta 2012) MORPHO (2012 a 2018) IDEMIA (Desde 2018)",
    "LC02": "HOGIER GARTNER",
    "LC03": "SERVICIOS INTEGRALES",
    "LC04": "UNION TEMPORAL",
    "LC05": "OBERTHUR",
    "LC06": "VALID HOGUIER",
    "LC07": "COSMO (Desde octubre 2017) COSMOCOLOR (Soportes a partir de LC20)",
    "LC08": "PURA BARUTAMA",
    "LC09": "THOMAS GREG & SONS",
    "LC10": "INTEXUS",
    "LC11": "IC&S.A:S",
    "LC12": "MUVA S.A.S."
  };

  function buscarFabricante() {
    const num = document.getElementById("numero").value.trim().padStart(2, '0');
    const codigo = `LC${num.toUpperCase()}`;
    const resultado = document.getElementById("resultado");
    if (fabricantes[codigo]) {
      // Clases UI adaptadas al Dark Mode GAD
      resultado.innerHTML = `<div class="p-4 bg-slate-800 border border-slate-700 rounded-lg shadow-lg text-slate-200">Fabricante:<br><span class="text-cyan-400 font-bold mt-2 inline-block">${fabricantes[codigo]}</span></div>`;
    } else {
      resultado.innerHTML = `<div class="p-4 bg-red-900/30 border border-red-700 rounded-lg shadow-lg text-red-400">Código no encontrado. Verifica el número ingresado.</div>`;
    }
  }

function mostrarTodos() {
    const resultado = document.getElementById("resultado");
    
    // SI YA HAY UNA TABLA VISIBLE, LA CERRAMOS Y SALIMOS
    if (resultado.querySelector('table')) {
      resultado.innerHTML = "";
      return;
    }

    // SI NO, GENERAMOS LA LISTA (Lógica existente)
    let listaHTML = `
      <div class="mt-4 bg-slate-800 rounded-xl shadow-lg border border-slate-700 table-responsive results-container overflow-hidden">
        <table class="w-full text-sm text-left text-slate-300">
          <thead class="text-xs text-cyan-500 uppercase bg-slate-900 border-b border-slate-700">
            <tr>
              <th scope="col" class="py-4 px-6 font-black tracking-wider">Código LC</th>
              <th scope="col" class="py-4 px-6 font-black tracking-wider">Fabricante</th>
            </tr>
          </thead>
          <tbody>
    `;

    for (const codigo in fabricantes) {
      if (fabricantes.hasOwnProperty(codigo)) {
        listaHTML += `
          <tr class="bg-slate-800 border-b border-slate-700/50 hover:bg-slate-750 transition-colors duration-150">
            <td class="py-4 px-6 font-bold text-cyan-400 whitespace-nowrap">${codigo}</td>
            <td class="py-4 px-6 text-slate-200">${fabricantes[codigo]}</td>
          </tr>
        `;
      }
    }
    listaHTML += `</tbody></table></div>`;
    resultado.innerHTML = listaHTML;
  }
  
  // Permitir que Enter dispare la búsqueda
  document.getElementById("numero").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      buscarFabricante();
    }
  });
</script>
</body>
</html>
