        function mostrarResultado(html, esError = false, pais = '') {
            const resultadoDiv = document.getElementById('resultado');
            const resultadoText = document.getElementById('resultText');
            const directivaDiv = document.getElementById('directiva');
            
            resultadoText.innerHTML = html;
            
            resultadoDiv.classList.toggle('bg-red-900', esError);
            resultadoDiv.classList.toggle('border-red-500', esError);
            resultadoDiv.classList.toggle('text-red-300', esError);

            resultadoDiv.classList.toggle('bg-slate-800', !esError);
            resultadoDiv.classList.toggle('border-slate-700', !esError);
            
            resultadoText.classList.toggle('text-center', esError);
            resultadoText.classList.toggle('text-left', !esError);

            const existingFlag = resultadoDiv.querySelector('.flag');
            if (existingFlag) {
                existingFlag.remove();
            }

            const existingButton = resultadoDiv.querySelector('#botonFrancia');
            if (existingButton) {
                existingButton.remove();
            }
            
            const existingButtonAlemania = resultadoDiv.querySelector('#botonAlemania');
            if (existingButtonAlemania) {
                existingButtonAlemania.remove();
            }


            if (pais && flagClassMap[pais]) {
                const flagDiv = document.createElement('div');
                flagDiv.className = `flag ${flagClassMap[pais]}`;
                resultadoDiv.appendChild(flagDiv);
            }

            if (pais) {
                directivaDiv.style.display = 'block';
            } else {
                directivaDiv.style.display = 'none';
            }
        }

        function buscarPais() {
            const select = document.getElementById('countrySelect');
            const input = select.value;
            if (!input) {
                mostrarResultado("Por favor, selecciona un país.", true);
                return;
            }

            const paisData = itvFrequencies[input];
            if (paisData) {
                let html = `
                    <div class="mb-2">
                        <p><span class="font-bold text-lg text-cyan-400">${input.toUpperCase()}:</span></p>
                        
                        <div class="mt-4 space-y-3">
                            <p class="text-sm bg-slate-900 p-3 rounded border border-slate-700">
                                <span class="font-bold text-slate-300 block uppercase tracking-wide text-[11px] mb-1">🚗 Turismos (Categoría M1 - Hasta 3.500 kg):</span> 
                                <span class="text-slate-200">${paisData.turismos}</span>
                            </p>
                            
                            <p class="text-sm bg-slate-900 p-3 rounded border border-slate-700">
                                <span class="font-bold text-slate-300 block uppercase tracking-wide text-[11px] mb-1">🏍️ Motocicletas (Categoría L):</span> 
                                <span class="text-slate-200">${paisData.motos}</span>
                            </p>
                            
                            <p class="text-sm bg-slate-900 p-3 rounded border border-slate-700">
                                <span class="font-bold text-slate-300 block uppercase tracking-wide text-[11px] mb-1">🚛 Vehículos Pesados (Categorías M2, M3, N2, N3 > 3.500 kg):</span> 
                                <span class="text-slate-200">${paisData.pesados}</span>
                            </p>
                        </div>
                    </div>
                `;
                
                const resultadoDiv = document.getElementById('resultado');
                const existingButton = resultadoDiv.querySelector('#botonFrancia');
                if (existingButton) existingButton.remove();
                const existingButtonAlemania = resultadoDiv.querySelector('#botonAlemania');
                if (existingButtonAlemania) existingButtonAlemania.remove();

                mostrarResultado(html, false, input);
                
                if (input === 'francia') {
                    const button = document.createElement('button');
                    button.id = 'botonFrancia';
                    button.textContent = 'CALCULADORA ITV MOTOS FRANCIA';
                    button.onclick = () => window.location.href = 'ITV MOTOS FRANCIA.html';
                    button.className = 'block mx-auto mt-4 w-full bg-cyan-600 text-white font-bold py-3 rounded-md hover:bg-cyan-500 transition shadow-md tracking-wider text-sm';
                    resultadoDiv.appendChild(button);
                }
                
                if (input === 'alemania') {
                    const button = document.createElement('button');
                    button.id = 'botonAlemania';
                    button.textContent = 'VERIFICADOR PEGATINA TÜV';
                    button.onclick = () => window.location.href = 'ITV ALEMANIA.html';
                    button.className = 'block mx-auto mt-4 w-full bg-cyan-600 text-white font-bold py-3 rounded-md hover:bg-cyan-500 transition shadow-md tracking-wider text-sm';
                    resultadoDiv.appendChild(button);
                }

            } else {
                mostrarResultado("País no encontrado o no disponible en la lista.", true);
            }
        }
        
        window.onload = function() {
            const select = document.getElementById('countrySelect');
            const paises = Object.keys(itvFrequencies).sort();
            
            paises.forEach(pais => {
                const option = document.createElement('option');
                option.value = pais;
                option.textContent = pais.charAt(0).toUpperCase() + pais.slice(1);
                select.appendChild(option);
            });
        };
