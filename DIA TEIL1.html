<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Días del Año - GAD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .listado-container {
      max-height: 300px;
      overflow-y: auto;
    }

    /* Adaptación de Textos de Ayuda y Firebase al Dark Mode */
    #helpContent [class*="bg-"], #helpContent [style*="background"] { background-color: #0f172a !important; border-color: #334155 !important; }
    #helpContent, #helpContent p, #helpContent span, #helpContent li { color: #e2e8f0 !important; }
    #helpContent h4, #helpContent strong, #helpContent b { color: #06b6d4 !important; font-weight: bold !important; background: transparent !important; }

    /* Zoom de miniaturas sin cortes (Solo PC) */
    td, tr { position: static !important; }
    .results-container { overflow: visible !important; }
    @media (hover: hover) and (pointer: fine) { 
        .thumbnail-img:hover { 
            transform: scale(4); 
            z-index: 9999 !important; 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            border-color: #06b6d4; 
        } 
    }

    /* Diseño Responsive para Tablas (Móvil) */
    @media (max-width: 768px) {
        table thead { display: none !important; }
        table tr { 
            display: flex !important; 
            flex-direction: column !important; 
            background: #1e293b !important; 
            border-radius: 12px !important; 
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #334155;
        }
        table td { border: none !important; padding: 0.5rem 0 !important; border-bottom: 1px solid #334155; }
        table td:last-child { border-bottom: none !important; }
        table td img.thumbnail-img { width: 100% !important; height: auto !important; object-fit: cover; border-radius: 8px; margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col pb-16">

  <header class="min-h-[5rem] py-3 md:py-0 md:h-28 bg-slate-900 w-full border-b border-slate-800 flex items-center justify-between px-2 md:px-8 shadow-md sticky top-0 z-[1000] gap-2">
    <img src="logogad.png" onerror="this.onerror=null; this.src='../ASSETS/logogad.png';" alt="GAD LOGO" class="h-[64px] w-[64px] md:h-[112px] md:w-[112px] drop-shadow-md flex-shrink-0">
    
    <div class="text-center flex-1">
      <h1 class="text-[15px] md:text-3xl font-black text-white tracking-wider uppercase leading-tight" id="headerTitle">
        Nº ORDEN DE DÍA<br class="md:hidden"> DEL AÑO TEIL 1
      </h1>
      <h2 class="text-cyan-500 font-bold tracking-widest uppercase text-[12px] md:text-sm mt-1 leading-tight">
        Grupo de Análisis Documental
      </h2>
    </div>

    <img src="t4c.png" onerror="this.onerror=null; this.src='../ASSETS/t4c.png';" alt="T4C" class="h-[56px] w-[56px] md:h-[96px] md:w-[96px] drop-shadow-md flex-shrink-0">
  </header>

  <h2 class="text-cyan-500 text-center mt-6 px-4 font-semibold">
    Convierte un día/año a su fecha completa
  </h2>

  <div class="w-11/12 max-w-md mx-auto mt-6 bg-slate-800 border border-slate-700 rounded-xl shadow-lg p-6">
    <div class="w-full mb-6">
      <img src="logoteil.png" alt="Imagen representativa" class="w-full rounded-md drop-shadow-md">
    </div>

    <input 
      type="text" 
      id="inputFecha" 
      placeholder="Ej: 365/25" 
      class="block mx-auto mt-4 p-3 text-base w-full border border-slate-700 bg-slate-900 text-slate-200 rounded-md text-center focus:outline-none focus:ring-2 focus:ring-cyan-500 placeholder-slate-500"
    />

    <button 
      onclick="calcularFecha()" 
      class="block mx-auto mt-4 w-full bg-cyan-600 text-white font-bold py-3 rounded-md hover:bg-cyan-500 transition shadow-md"
    >
      Calcular Fecha
    </button>
    
    <p class="mt-4 text-center text-red-400 font-semibold text-sm">
      OJO!!! Si no coincide puede tratarse de un duplicado
    </p>

    <p id="leyendaBisiesto" class="mt-2 text-center text-slate-400 text-xs font-semibold">
      El programa tiene en cuenta los años bisiestos.
    </p>
    
    <div class="w-full mt-6 pt-4 border-t border-slate-700">
      <img src="logoidatum.png" alt="Logo I-DATUM" class="w-full rounded-md opacity-90">
    </div>

    <div id="output" class="mt-6 text-slate-200 text-center w-full mx-auto"></div>
  </div>

  <script>
    function esBisiesto(year) {
      return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    }

    function calcularFecha() {
      const input = document.getElementById("inputFecha").value;
      const output = document.getElementById("output");
      const partes = input.split("/");

      if (partes.length !== 2) {
        output.innerHTML = "<p class='text-red-500 font-semibold'>Formato incorrecto. Por favor, usa el formato 'dia/año' (Ej: 365/25).</p>";
        return;
      }

      const diaAnio = parseInt(partes[0]);
      const anio = parseInt(partes[1]);
      
      const anioCompleto = anio > 99 ? anio : 2000 + anio;

      if (isNaN(diaAnio) || isNaN(anio) || diaAnio < 1 || diaAnio > 366) {
        output.innerHTML = "<p class='text-red-500 font-semibold'>Por favor, ingresa valores numéricos válidos.</p>";
        return;
      }

      if (diaAnio > 365 && !esBisiesto(anioCompleto)) {
        output.innerHTML = "<p class='text-red-500 font-semibold'>El año no es bisiesto, el día del año debe ser 365 o menos.</p>";
        return;
      }

      const fechaBase = new Date(anioCompleto, 0, 1);
      fechaBase.setDate(diaAnio);

      const dia = fechaBase.getDate().toString().padStart(2, '0');
      const mes = (fechaBase.getMonth() + 1).toString().padStart(2, '0');
      const year = fechaBase.getFullYear();
      
      let mensajeAdicional = "";
      if (esBisiesto(anioCompleto)) {
          mensajeAdicional = "<p class='text-green-500'>(Año Bisiesto)</p>";
      }
      
      output.innerHTML = `
        <p class='text-cyan-400 font-semibold text-lg'>
          La fecha de I Datum es: ${dia}/${mes}/${year}
        </p>
        ${mensajeAdicional}
      `;
    }

    document.getElementById("inputFecha").addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        calcularFecha();
      }
    });
  </script>
</body>
</html>
