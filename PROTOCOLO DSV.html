<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Actuación DSV - GAD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
   <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        /* --- GENERAL DARK MODE --- */
        body { 
            font-family: 'Inter', Arial, sans-serif; 
            line-height: 1.6; 
            background-color: #0f172a; 
            color: #e2e8f0;
        }

        /* --- SCROLLBAR FORZADA DARK MODE --- */
        html, body, aside, main, div, .overflow-y-auto, #edit-actuacion {
            scrollbar-width: thin !important;
            scrollbar-color: #334155 #0f172a !important;
        }
        ::-webkit-scrollbar { width: 8px !important; height: 8px !important; background-color: #0f172a !important; }
        ::-webkit-scrollbar-track { background-color: #0f172a !important; border-radius: 8px !important; }
        ::-webkit-scrollbar-thumb { background-color: #334155 !important; border-radius: 8px !important; }
        ::-webkit-scrollbar-thumb:hover { background-color: #06b6d4 !important; }

        /* --- CONTENEDORES --- */
        .container { 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); 
            padding: 24px;
        }

        /* --- BOTONES (Sobreescribiendo las clases inyectadas por JS) --- */
        .btn { padding: 12px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
        
        .btn-primary { 
            background-color: #0f172a !important; 
            color: #06b6d4 !important; 
            border: 1px solid #0891b2 !important; 
            font-weight: 900; 
            text-transform: uppercase;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease-in-out;
        }
        .btn-primary:hover { 
            background-color: #06b6d4 !important; 
            color: #0f172a !important; 
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            transform: translateY(-2px);
        }

        .btn-back { 
            background-color: #334155 !important; 
            color: #e2e8f0 !important; 
            border: 1px solid #475569 !important; 
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-back:hover { background-color: #475569 !important; border-color: #94a3b8 !important; }

        /* Icono de edición (Pencil) en botones primarios */
        .fa-pencil-alt { color: #06b6d4 !important; transition: all 0.2s; font-size: 16px; }
        .btn-primary:hover + .fa-pencil-alt { color: #0f172a !important; }

        /* Botón de Editar Resultado de Firebase (JS le pone amarillo, lo adaptamos a Dark Mode) */
        button.bg-yellow-400.text-black {
            background-color: #d97706 !important;
            color: #ffffff !important;
            border: none !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        button.bg-yellow-400.text-black:hover { background-color: #b45309 !important; }

        /* --- RESULTADOS DE PROTOCOLO --- */
        .result-box { margin-top: 24px; padding: 20px; border-radius: 12px; border: 2px solid; }
        .result-box.delito { background-color: rgba(239, 68, 68, 0.05); border-color: #ef4444; color: #fca5a5; }
        .result-box.infraccion { background-color: rgba(234, 179, 8, 0.05); border-color: #eab308; color: #fde047; }
        .result-box.ok { background-color: rgba(34, 197, 94, 0.05); border-color: #22c55e; color: #86efac; }
        
        .result-box h2 { 
            color: #e2e8f0; 
            text-transform: uppercase; 
            font-weight: 900; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px; 
            margin-bottom: 16px; 
            letter-spacing: 0.05em;
        }
        #detalle-caso div { margin-bottom: 10px; }
        #detalle-caso strong { color: #06b6d4; text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 2px; }

        .hidden { display: none !important; }
        
        /* Modificadores extra para las preguntas generadas */
        #question-container p { color: #06b6d4; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; font-size: 13px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col pb-16 text-slate-200">

    <header class="min-h-[5rem] py-3 md:py-0 md:h-28 bg-slate-900 w-full border-b border-slate-800 flex items-center justify-between px-2 md:px-8 shadow-md sticky top-0 z-[1000] gap-2">
      <img src="logogad.png" onerror="this.onerror=null; this.src='../ASSETS/logogad.png';" alt="GAD LOGO" class="h-[64px] w-[64px] md:h-[112px] md:w-[112px] drop-shadow-md flex-shrink-0">
      
      <div class="text-center flex-1">
        <h1 class="text-[15px] md:text-3xl font-black text-white tracking-wider uppercase leading-tight" id="headerTitle">
          PROTOCOLO<br class="md:hidden"> PERMISOS DSV
        </h1>
        <h2 class="text-cyan-500 font-bold tracking-widest uppercase text-[12px] md:text-sm mt-1 leading-tight">
          Grupo de Análisis Documental
        </h2>
      </div>

      <img src="t4c.png" onerror="this.onerror=null; this.src='../ASSETS/t4c.png';" alt="T4C" class="h-[56px] w-[56px] md:h-[96px] md:w-[96px] drop-shadow-md flex-shrink-0">
    </header>

    <div class="w-11/12 max-w-md mx-auto mt-8 bg-slate-800 p-6 rounded-2xl shadow-2xl container border border-slate-700">
        <p class="text-cyan-500 font-black uppercase tracking-wider text-center text-sm mb-4 border-b border-slate-700 pb-4">
            SELECCIONE EL SUPUESTO PARA COMENZAR:
        </p>
        
        <div id="supuestos-container" class="mt-4 flex flex-col gap-3"></div>
        <div id="question-container" class="mt-6 flex flex-col gap-2"></div>

        <div id="resultado" class="hidden result-box mt-6">
            <h2 class="text-lg font-bold mb-2">Detalles del Caso</h2>
            <div id="detalle-caso" class="text-sm"></div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/80 overflow-y-auto h-full w-full z-[2000]">
        <div class="relative top-20 mx-auto p-6 border border-slate-700 w-11/12 max-w-lg shadow-2xl rounded-2xl bg-slate-800">
            <h3 class="text-lg font-black text-cyan-500 uppercase tracking-widest mb-6 border-b border-slate-700 pb-3">Editar Resultado</h3>
            <form id="edit-form" class="space-y-4">
                <div>
                    <label for="edit-hecho" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Hecho:</label>
                    <input type="text" id="edit-hecho" class="block w-full rounded-lg border-slate-600 bg-slate-900 text-slate-200 shadow-sm focus:border-cyan-500 focus:ring focus:ring-cyan-500/30 p-2.5 outline-none transition-all">
                </div>
                <div>
                    <label for="edit-resumen" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Resumen:</label>
                    <input type="text" id="edit-resumen" class="block w-full rounded-lg border-slate-600 bg-slate-900 text-slate-200 shadow-sm focus:border-cyan-500 focus:ring focus:ring-cyan-500/30 p-2.5 outline-none transition-all">
                </div>
                <div>
                    <label for="edit-actuacion" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Actuación:</label>
                    <div id="edit-actuacion" contenteditable="true" class="block w-full rounded-lg border border-slate-600 bg-slate-900 text-slate-200 shadow-sm focus:border-cyan-500 focus:ring focus:ring-cyan-500/30 p-3 min-h-[200px] outline-none transition-all"></div>
                </div>
                <div class="flex justify-end space-x-3 mt-8">
                    <button type="button" id="cancel-edit" class="px-5 py-2.5 bg-slate-700 text-slate-200 font-bold rounded-lg hover:bg-slate-600 transition-all uppercase text-xs">Cancelar</button>
                    <button type="button" id="save-edit" class="px-5 py-2.5 bg-cyan-600 text-slate-900 font-black rounded-lg hover:bg-cyan-500 transition-all uppercase text-xs shadow-[0_0_15px_rgba(6,182,212,0.4)]">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
          apiKey: "AIzaSyCY8V_P7m8lZUvGbMVlGaa-GVhbmyikmag",
          authDomain: "gad-alicante-v4.firebaseapp.com",
          databaseURL: "https://gad-alicante-v4-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "gad-alicante-v4",
          storageBucket: "gad-alicante-v4.firebasestorage.app",
          messagingSenderId: "119727545224",
          appId: "1:119727545224:web:36880c50d196c456cdb83d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Árboles de decisiones ---
        const decisionTrees = {
            "perdida-puntos": {
                question: "¿CONDUCE DURANTE EL PERIODO DE PÉRDIDA DE VIGENCIA?",
                options: {
                    "SI (Solo permisos españoles)": "conduce-durante",
                    "FINALIZADO SIN CURSO NI EXAMEN": "finalizado-no-curso-examen",
                    "FINALIZADO CON CURSO SIN EXAMEN": "finalizado-no-examen",
                    "FINALIZADO CON CURSO Y EXAMEN": "finalizado-si-examen",
                    "NO TIENE CONOCIMIENTO EDICTAL": "no-conocimiento",
                    "EN RECURSO DE ALZADA": "incidencias-recurso",
                    "PENDIENTE DE RECURSO": "incidencias-pendiente"
                }
            },
            "suspension-judicial": {
                question: "¿LA CONDENA ES MAYOR A 2 AÑOS?",
                options: {
                    "NO": {
                        question: "¿CUÁNDO CONDUCE?",
                        options: {
                            "DENTRO": "dentro-condena-menor",
                            "FINALIZADO SIN CURSO": "finalizado-condena-menor-no-curso",
                            "FINALIZADO CON CURSO": "finalizado-condena-menor-si-curso"
                        }
                    },
                    "SI": {
                        question: "¿CUÁNDO CONDUCE?",
                        options: {
                            "DENTRO": "dentro-condena-mayor",
                            "FINALIZADO SIN CURSO NI EXAMEN": "finalizado-condena-mayor-no-curso-examen",
                            "FINALIZADO CON CURSO Y EXAMEN": "finalizado-condena-mayor-si-curso-examen"
                        }
                    }
                }
            },
            "carencia": {
                question: "¿HA OBTENIDO ALGUNA VEZ EL PERMISO?",
                options: {
                    "NO": "nunca-obtenido",
                    "TIENE PERMISO DE OTRO TIPO/PAÍS": "carecer-permiso"
                }
            },
            "psicofisicas": {
                question: "¿ES PÉRDIDA DE VIGENCIA O FALTA DE REQUISITOS?",
                options: {
                    "PÉRDIDA DE VIGENCIA": "perdida-psicofisicas",
                    "SIN REQUISITOS EXIGIDOS": "sin-requisitos"
                }
            }
        };

        let history = [];
        let currentSection = null;
        let currentCaseKey = null;

        function findCaseParent(caseKey) {
            for (const section in decisionTrees) {
                if (typeof decisionTrees[section].options === 'object') {
                    for (const option in decisionTrees[section].options) {
                        const nextNode = decisionTrees[section].options[option];
                        if (typeof nextNode === 'string' && nextNode === caseKey) {
                            return section;
                        }
                        if (typeof nextNode === 'object') {
                            for (const nestedOption in nextNode.options) {
                                if (nextNode.options[nestedOption] === caseKey) {
                                    return section;
                                }
                            }
                        }
                    }
                }
            }
            return null;
        }

        function initSupuestos() {
            const container = document.getElementById("supuestos-container");
            container.innerHTML = "";
            for (let key in decisionTrees) {
                const btnContainer = document.createElement("div");
                btnContainer.className = "relative w-full";
                const btn = document.createElement("button");
                btn.className = "btn btn-primary w-full";
                btn.textContent = key.replace(/-/g, " ").toUpperCase();
                btn.onclick = () => startQuestions(key);
                const editIcon = document.createElement("i");
                editIcon.className = "fas fa-pencil-alt absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer z-10 text-white";
                editIcon.onclick = (e) => {
                    e.stopPropagation();
                    editButtonText(btn, key.replace(/-/g, " ").toUpperCase(), 'supuesto');
                };
                btnContainer.appendChild(btn);
                btnContainer.appendChild(editIcon);
                container.appendChild(btnContainer);
            }
        }

        function startQuestions(sectionKey) {
            const container = document.getElementById("question-container");
            const resultDiv = document.getElementById("resultado");
            container.innerHTML = "";
            resultDiv.classList.add("hidden");
            history = [];
            currentSection = sectionKey;
            if (!sectionKey) return;
            const tree = decisionTrees[sectionKey];
            history.push(tree);
            showQuestion(tree);
        }

        function showQuestion(node) {
            const container = document.getElementById("question-container");
            container.innerHTML = `<p class=\"font-bold mb-2\">${node.question}</p>`;
            for (let key in node.options) {
                const btnContainer = document.createElement("div");
                btnContainer.className = "relative w-full";
                const btn = document.createElement("button");
                btn.className = "btn btn-primary w-full mt-2";
                btn.textContent = key.toUpperCase();
                btn.onclick = () => handleAnswer(node.options[key]);
                const editIcon = document.createElement("i");
                editIcon.className = "fas fa-pencil-alt absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer z-10 text-white";
                editIcon.onclick = (e) => {
                    e.stopPropagation();
                    editButtonText(btn, key, node.options[key]);
                };
                btnContainer.appendChild(btn);
                btnContainer.appendChild(editIcon);
                container.appendChild(btnContainer);
            }
            const backBtn = document.createElement("button");
            backBtn.className = "btn btn-back w-full mt-4";
            backBtn.textContent = "VOLVER ATRÁS";
            backBtn.onclick = goBack;
            container.appendChild(backBtn);
        }

        function editButtonText(buttonElement, oldText, caseValue) {
            const newText = prompt("Introduce el nuevo texto para el botón:", buttonElement.textContent);
            if (newText === null || newText.trim() === "") return;
            if (confirm(`¿Estás seguro de que deseas cambiar el texto a "${newText}"?`)) {
                function updateDecisionTree(node, oldKey, newKey) {
                    if (typeof node === 'object' && node.options) {
                        const newOptions = {};
                        let changed = false;
                        for (const key in node.options) {
                            if (key.toUpperCase() === oldKey.toUpperCase()) {
                                newOptions[newKey] = node.options[key];
                                changed = true;
                            } else {
                                newOptions[key] = node.options[key];
                            }
                        }
                        if (changed) {
                            node.options = newOptions;
                            return true;
                        }
                        for (const key in node.options) {
                            if (updateDecisionTree(node.options[key], oldKey, newKey)) {
                                return true;
                            }
                        }
                    }
                    return false;
                }
                if (caseValue === 'supuesto') {
                    const newKey = newText.toLowerCase().replace(/ /g, "-");
                    const oldKey = oldText.toLowerCase().replace(/ /g, "-");
                    if (decisionTrees[oldKey]) {
                        decisionTrees[newKey] = decisionTrees[oldKey];
                        delete decisionTrees[oldKey];
                        buttonElement.textContent = newText.toUpperCase();
                        currentSection = newKey;
                    }
                } else {
                    const currentPath = history[history.length - 1];
                    updateDecisionTree(currentPath, oldText, newText.toUpperCase());
                    buttonElement.textContent = newText.toUpperCase();
                }
            }
        }

        function handleAnswer(nextNode) {
            if (typeof nextNode === "string") {
                showResult(nextNode);
            } else {
                history.push(nextNode);
                showQuestion(nextNode);
            }
        }

        function goBack() {
            const resultDiv = document.getElementById("resultado");
            if (!resultDiv.classList.contains("hidden")) {
                resultDiv.classList.add("hidden");
                history = [];
                showQuestion(decisionTrees[currentSection]);
                return;
            }
            if (history.length > 1) {
                history.pop();
                showQuestion(history[history.length - 1]);
            } else {
                document.getElementById("question-container").innerHTML = "";
                currentSection = null;
            }
        }

      function showResult(optionKey) {
            const resultDiv = document.getElementById("resultado");
            const detailDiv = document.getElementById("detalle-caso");
            const container = document.getElementById("question-container");
            const parentKey = findCaseParent(optionKey);

            if (!parentKey) {
                detailDiv.innerHTML = "Error: No se encontró la categoría para este caso.";
                resultDiv.className = `result-box delito`;
                resultDiv.classList.remove("hidden");
                // Botón volver en caso de error temprano
                const backBtn = document.createElement("button");
                backBtn.className = "btn btn-back w-full mt-4";
                backBtn.textContent = "VOLVER ATRÁS";
                backBtn.onclick = goBack;
                container.appendChild(backBtn);
                return;
            }

            currentCaseKey = optionKey;
            container.innerHTML = "";
            detailDiv.innerHTML = "Cargando...";

            db.ref(`protocolo/${parentKey}/options/${optionKey}`).once('value').then((snapshot) => {
                const info = snapshot.val();
                if (info) {
                    let hecho = info.hecho.replace("DELITO LSV art.384 CP- ATESTADO", "DSV DELITO art.384 CP - ATESTADO");
                    let resumen = info.resumen.replace("DELITO LSV art.384 CP- ATESTADO", "DSV DELITO art.384 CP - ATESTADO");
                    let actuacion = info.actuacion.replace("DELITO LSV art.384 CP- ATESTADO", "DSV DELITO art.384 CP - ATESTADO");
                    detailDiv.innerHTML = `
                        <div><strong>Hecho:</strong> <br>${hecho}</div>
                        <div><strong>Resumen:</strong> <br>${resumen}</div>
                        <div><strong>Actuación:</strong> <br>${actuacion}</div>
                    `;
                    resultDiv.className = `result-box ${info.tipo}`;
                    resultDiv.classList.remove("hidden");
                    
                    // Solo mostramos el botón Editar si la carga fue exitosa
                    const editBtn = document.createElement("button");
                    editBtn.className = "btn btn-back w-full mt-4 bg-yellow-400 text-black";
                    editBtn.textContent = "EDITAR RESULTADO";
                    editBtn.onclick = () => openEditModal(info);
                    container.appendChild(editBtn);
                } else {
                    detailDiv.innerHTML = "No se encontraron datos para este caso. Revise su base de datos de Firebase.";
                    resultDiv.className = `result-box ok`;
                    resultDiv.classList.remove("hidden");
                }
            }).catch(error => {
                // Si hay un error de permisos u otro, lo muestra sin colgar la app
                detailDiv.innerHTML = "Error al cargar los datos: " + error.message;
                resultDiv.className = `result-box delito`;
                resultDiv.classList.remove("hidden");
            }).finally(() => {
                // ESTO ES CLAVE: El botón "Volver atrás" se crea SIEMPRE, pase lo que pase.
                const backBtn = document.createElement("button");
                backBtn.className = "btn btn-back w-full mt-4";
                backBtn.textContent = "VOLVER ATRÁS";
                backBtn.onclick = goBack;
                container.appendChild(backBtn);
            });
        }

        function openEditModal(data) {
            const modal = document.getElementById("edit-modal");
            document.getElementById("edit-hecho").value = data.hecho;
            document.getElementById("edit-resumen").value = data.resumen;
            document.getElementById("edit-actuacion").innerHTML = data.actuacion;
            modal.classList.remove("hidden");
        }

        document.getElementById("save-edit").onclick = () => {
            const parentKey = findCaseParent(currentCaseKey);
            if (!parentKey) {
                alert("Error: No se pudo encontrar la categoría del caso.");
                return;
            }
            const updatedData = {
                hecho: document.getElementById("edit-hecho").value,
                resumen: document.getElementById("edit-resumen").value,
                actuacion: document.getElementById("edit-actuacion").innerHTML
            };
            if (currentCaseKey) {
                db.ref(`protocolo/${parentKey}/options/${currentCaseKey}`).update(updatedData)
                    .then(() => {
                        console.log("Cambios guardados con éxito.");
                        document.getElementById("edit-modal").classList.add("hidden");
                        showResult(currentCaseKey);
                    })
                    .catch((error) => {
                        console.error("Error al guardar los cambios:", error);
                        alert("Hubo un error al guardar los cambios.");
                    });
            } else {
                alert("No se pudo guardar: no hay un caso seleccionado.");
            }
        };

        document.getElementById("cancel-edit").onclick = () => {
            document.getElementById("edit-modal").classList.add("hidden");
        };

        document.addEventListener("DOMContentLoaded", initSupuestos);
    </script>
</body>
</html>
